<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FORGE"/>
<meta name="theme-color" content="#080808"/>
<link rel="manifest" id="pwa-manifest"/>
<link rel="apple-touch-icon" id="apple-icon"/>
<title>FORGE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#080808;color:#f0f0f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none}
:root{
  --bg:#080808;--s1:#111;--s2:#181818;--s3:#222;
  --border:#2a2a2a;--border2:#333;
  --acc:#e8ff47;--acc2:#ff6b35;--acc3:#47ffb2;
  --txt:#f0f0f0;--muted:#555;--muted2:#777;
  --red:#ff4455;--green:#44ffaa;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --r:0px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
/* scrollable areas */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-track{background:transparent}
.scroll::-webkit-scrollbar-thumb{background:var(--border2)}

/* typography */
.display{font-family:var(--font-display);letter-spacing:3px;line-height:1}
.mono{font-family:var(--font-mono)}
.label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted2)}
.label-acc{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--acc)}

/* layout */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + var(--safe-bottom))}
.page::-webkit-scrollbar{display:none}

/* bottom nav */
.nav{
  position:absolute;bottom:0;left:0;right:0;
  height:calc(60px + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--s1);border-top:1px solid var(--border);
  display:flex;z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  cursor:pointer;padding:8px 4px;transition:all 0.15s;
}
.nav-item .ni{font-size:19px;transition:transform 0.15s}
.nav-item .nl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.nav-item.active .nl{color:var(--acc)}
.nav-item.active .ni{transform:scale(1.15)}
.nav-item:active .ni{transform:scale(0.9)}

/* buttons */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--font-body);font-weight:700;font-size:13px;
  letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;
  transition:all 0.15s;padding:15px 20px;
}
.btn:active{transform:scale(0.97)}
.btn-acc{background:var(--acc);color:#000}
.btn-acc:hover{background:#fff}
.btn-acc2{background:var(--acc2);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted2)}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn:disabled{background:var(--border)!important;color:var(--muted)!important;cursor:not-allowed;transform:none!important}

/* inputs */
.inp{
  width:100%;background:var(--s2);border:1px solid var(--border);
  color:var(--txt);padding:13px 15px;font-family:var(--font-body);
  font-size:15px;outline:none;transition:border 0.2s;
}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--muted)}
textarea.inp{resize:none;min-height:90px;line-height:1.6}

/* cards */
.card{background:var(--s1);border:1px solid var(--border);padding:16px}
.card-acc{border-left:3px solid var(--acc)}
.card-acc2{border-left:3px solid var(--acc2)}
.card-green{border-left:3px solid var(--green)}

/* divider */
.divider{height:1px;background:var(--border);margin:0}

/* modal backdrop */
.modal-bg{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.88);
  display:flex;align-items:flex-end;justify-content:center;
}
.modal-sheet{
  background:var(--s1);border-top:1px solid var(--border2);
  width:100%;max-width:640px;
  padding:28px 22px calc(32px + var(--safe-bottom));
  max-height:88vh;overflow-y:auto;
}
.modal-sheet::-webkit-scrollbar{display:none}

/* chips / badges */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;border:1px solid;
}
.chip-acc{color:var(--acc);border-color:var(--acc)}
.chip-acc2{color:var(--acc2);border-color:var(--acc2)}
.chip-green{color:var(--green);border-color:var(--green)}
.chip-muted{color:var(--muted2);border-color:var(--border2)}

/* step dots */
.dots{display:flex;gap:5px;margin-bottom:28px}
.dot{height:3px;flex:1;background:var(--border);transition:background 0.3s}
.dot.done{background:var(--acc)}

/* choice grid */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.cspan{grid-column:1/-1}
.cbtn{
  background:var(--s1);border:1px solid var(--border2);color:var(--txt);
  padding:16px 12px;font-family:var(--font-body);font-size:13px;font-weight:500;
  cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.4;
}
.cbtn:hover{border-color:var(--acc);color:var(--acc)}
.cbtn.sel{border-color:var(--acc);background:rgba(232,255,71,0.07);color:var(--acc)}
.cbtn .ci{font-size:20px;display:block;margin-bottom:5px}

/* exercise card */
.ex-card{background:var(--s1);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.ex-header{
  padding:13px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;
  user-select:none;
}
.ex-header:active{background:var(--s2)}
.ex-body{border-top:1px solid var(--border);padding:14px}
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.set-inp{
  flex:1;background:var(--bg);border:1px solid var(--border);
  color:var(--txt);padding:9px 6px;font-family:var(--font-mono);
  font-size:14px;outline:none;text-align:center;transition:border 0.2s;
}
.set-inp:focus{border-color:var(--acc)}
.set-done-btn{
  width:30px;height:30px;border:1px solid var(--border2);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--muted2);transition:all 0.15s;flex-shrink:0;
}
.set-done-btn.done{background:var(--green);border-color:var(--green);color:#000}

/* time bar */
.time-bar{
  background:var(--s2);border-bottom:1px solid var(--border);
  padding:9px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.tc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted2)}
.tc .tv{font-family:var(--font-mono);font-size:13px;color:var(--acc);font-weight:500}
.tc.over .tv{color:var(--acc2)}

/* spinner */
.spin{
  width:44px;height:44px;border:2px solid var(--border2);
  border-top-color:var(--acc);border-radius:50%;
  animation:rotating 0.7s linear infinite;
}
@keyframes rotating{to{transform:rotate(360deg)}}

/* thinking dots */
.thinking{display:flex;gap:5px;align-items:center;padding:12px 14px}
.td{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.1s infinite}
.td:nth-child(2){animation-delay:.18s}
.td:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* chat */
.msg{max-width:86%;padding:11px 14px;font-size:14px;line-height:1.65}
.msg.user{align-self:flex-end;background:var(--acc);color:#000;font-weight:500}
.msg.ai{align-self:flex-start;background:var(--s2);border:1px solid var(--border)}
.msg.ai strong{color:var(--acc)}
.msg.ai ul{padding-left:16px;margin:5px 0}
.msg.ai li{margin-bottom:3px}

/* history */
.hist-entry{background:var(--s1);border:1px solid var(--border);padding:14px 16px;margin-bottom:8px}

/* toast */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--acc);
  color:var(--acc);padding:10px 20px;font-size:13px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;z-index:999;
  animation:fadeUp 0.3s ease;white-space:nowrap;
}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* install banner */
.install-banner{
  position:fixed;bottom:calc(68px + var(--safe-bottom));left:12px;right:12px;
  background:var(--s2);border:1px solid var(--acc);
  padding:12px 14px;display:flex;align-items:center;gap:10px;z-index:150;
  animation:fadeUp 0.3s ease;
}

/* section header */
.sec-hdr{
  display:flex;align-items:center;gap:8px;margin-bottom:12px;
}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border)}

/* day card */
.day-card{
  background:var(--s1);border:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all 0.15s;margin-bottom:8px;
}
.day-card:hover,.day-card:active{border-color:var(--acc)}
.day-card.today{border-color:var(--acc);background:rgba(232,255,71,0.04)}
.day-card.done{border-color:var(--green);opacity:0.65;cursor:default}
.day-card.rest{cursor:default;opacity:0.5}

/* swap / add mode tabs */
.mtabs{display:flex;border:1px solid var(--border2);margin-bottom:16px}
.mtab{
  flex:1;padding:11px 8px;background:transparent;border:none;
  color:var(--muted2);font-family:var(--font-body);font-size:12px;
  font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;
}
.mtab.active{background:rgba(232,255,71,0.08);color:var(--acc)}

/* prior session */
.pscard{background:var(--s1);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.pshdr{padding:12px 14px;display:flex;align-items:center;cursor:pointer}
.psbody{border-top:1px solid var(--border);padding:14px;display:none}
.psbody.open{display:block}

/* remove confirm inline */
.rm-confirm{
  background:rgba(255,68,85,0.08);border-top:1px solid var(--red);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'forge_r1';
const API_URL = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-sonnet-4-20250514';

const DAYS_OF_WEEK = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const SPLIT_GUIDE = {
  2:'Full Body A / Full Body B',
  3:'Push / Pull / Legs',
  4:'Upper / Lower / Push / Pull',
  5:'Push / Pull / Legs / Upper / Lower',
  6:'Push / Pull / Legs / Push / Pull / Legs'
};

// ─── API KEY ─────────────────────────────────────────────────────────────────
let _apiKey = '';
function getApiKey() { return _apiKey || localStorage.getItem('forge_apikey') || ''; }
function setApiKey(k) { _apiKey = k; localStorage.setItem('forge_apikey', k); }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
async function callAI(messages, maxTokens = 1000) {
  const key = getApiKey();
  if (!key) throw new Error('No API key set. Please enter your Anthropic API key in Settings.');
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'x-api-key': key,
    },
    body: JSON.stringify({ model: MODEL, max_tokens: maxTokens, messages })
  });
  if (!res.ok) {
    const errBody = await res.text().catch(() => '');
    throw new Error(`API ${res.status}: ${errBody}`);
  }
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return data.content.map(c => c.text || '').join('');
}

function parseJSON(text) {
  return JSON.parse(text.replace(/```json|```/g, '').trim());
}

function parseRestSecs(r = '') {
  const s = r.toLowerCase();
  const m = s.match(/(\d+)\s*min/), sec = s.match(/(\d+)\s*s/);
  return (m ? +m[1] * 60 : 0) + (sec ? +sec[1] : 0) || 60;
}

function parseAvgReps(r = '') {
  const range = r.match(/(\d+)\s*[-–]\s*(\d+)/);
  if (range) return (+range[1] + +range[2]) / 2;
  const n = r.match(/(\d+)/);
  return n ? +n[1] : 10;
}

function estimateWorkoutMins(exercises = []) {
  let secs = 5 * 60; // warmup
  exercises.forEach(ex => {
    const sets = ex.sets || 3;
    secs += sets * (parseAvgReps(ex.reps) * 4 + parseRestSecs(ex.rest)) + 60;
  });
  return Math.round(secs / 60);
}

function formatMins(m) {
  return m >= 60 ? `${Math.floor(m/60)}h ${m%60}m` : `${m} min`;
}

function useLocalStorage(key, init) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; }
    catch { return init; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, set];
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

function Spinner() {
  return <div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'40px'}}>
    <div className="spin"/>
  </div>;
}

function formatAI(text = '') {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br/>');
}

// ─── DAY NUMBER HELPERS ───────────────────────────────────────────────────────
function getDayNum(dayName) {
  return DAYS_OF_WEEK.indexOf(dayName);
}

function getTodayName() {
  return new Date().toLocaleDateString('en-US', { weekday: 'long' });
}

// ─── PLAN GENERATION ─────────────────────────────────────────────────────────
function parseDaysCount(dStr = '') {
  if (!dStr) return 4;
  if (dStr.includes('flexible') || dStr.includes('4-5')) return 5;
  if (dStr.includes('sure') || dStr.includes('surprise')) return 4;
  // extract first number from strings like "4 days", "5 days", "6 days"
  const m = dStr.match(/(\d+)/);
  return m ? Math.min(Math.max(parseInt(m[1]), 2), 6) : 4;
}

function extractJSON(text) {
  // Try direct parse first
  try { return JSON.parse(text.trim()); } catch {}
  // Strip markdown fences
  const stripped = text.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
  try { return JSON.parse(stripped); } catch {}
  // Find first { ... } block
  const start = stripped.indexOf('{');
  const end = stripped.lastIndexOf('}');
  if (start !== -1 && end !== -1) {
    try { return JSON.parse(stripped.slice(start, end + 1)); } catch {}
  }
  throw new Error('Could not parse JSON from response');
}

function buildLastWeekLog(history, weekNum, weekPlan) {
  const weekEntries = history.filter(h => h.week === weekNum && !h.isPrior);
  if (!weekEntries.length) return '';
  return weekEntries.map(entry => {
    const day = weekPlan?.days?.find(d => d.workoutName === entry.workoutName);
    if (!entry.loggedSets || !day) return `${entry.workoutName}: ${entry.summary}`;
    const details = day.exercises.map((ex, ei) => {
      const sets = entry.loggedSets[ei] || [];
      const logged = sets.filter(s => s.weight || s.reps);
      if (!logged.length) return `  ${ex.name}: no data`;
      const setsStr = logged.map(s => `${s.weight||'?'}lbs×${s.reps||'?'}`).join(', ');
      return `  ${ex.name}: ${setsStr}`;
    }).join('\n');
    return `${entry.workoutName}:\n${details}`;
  }).join('\n\n');
}
  const n = parseDaysCount(profile.days);
  const suggestedSplit = SPLIT_GUIDE[n] || SPLIT_GUIDE[4];

  // User's explicit split preference takes absolute priority
  const splitInstruction = profile.split
    ? `TRAINING SPLIT — FOLLOW THIS EXACTLY: "${profile.split}"
   The athlete has specified this split. You MUST use it. Do not substitute a different split.`
    : `TRAINING SPLIT — AI choice: The athlete has no preference. Use a smart split for ${n} days.
   Suggested: ${suggestedSplit}. Choose what best fits their goal (${profile.goal}).`;

  const priorCtx = priorSummary ? `\nPRIOR HISTORY (calibrate intensity/weights from this):\n${priorSummary}\n` : '';
  const lastCtx = lastWeekLog ? `\nLAST WEEK ACTUAL LOGGED DATA:\n${lastWeekLog}\n` : '';

  const progressInstruction = lastWeekLog ? `
PROGRESSIVE OVERLOAD — REQUIRED FOR WEEK ${weekNum}:
Use the logged data above to prescribe specific targets. For every exercise that appeared last week, add a "target" field with exact weight and rep prescription, e.g. "target": "4×8 @ 195lbs (+5lbs from last week)" or "target": "3×10 @ 135lbs (same weight, hit all reps cleanly)".
Apply standard progression: ~5lbs upper body compounds, ~10lbs lower body, same weight if reps weren't completed, deload 10% if athlete showed signs of fatigue.` : '';

  const prompt = `You are FORGE, an expert AI personal trainer. Create a week ${weekNum} training plan.${priorCtx}${lastCtx}

ATHLETE PROFILE:
- Name: ${profile.name}
- Goal: ${profile.goal}
- Experience: ${profile.experience}
- Equipment: ${profile.equipment}
- Notes / injuries: ${profile.notes || 'none'}

${splitInstruction}
${progressInstruction}

STRICT OUTPUT RULES:
1. Return EXACTLY 7 day objects, Monday through Sunday.
2. EXACTLY ${n} days must have "isRest": false. The other ${7 - n} must have "isRest": true.
3. Every training day must have 4–5 exercises appropriate for that day's muscle group focus.
4. Every exercise must be achievable with this equipment: ${profile.equipment}.
5. Every exercise object must include: name (string), sets (number), reps (string), rest (string), notes (string). Include "target" (string) when progression data exists.
6. The workoutName and focus for each day must match the split — different across days.
${weekNum > 1 ? '7. Progress from last week using the actual logged data.' : ''}

Return ONLY the JSON object with no extra text or markdown:
{"weekTheme":"string","insight":"string","days":[{"dayName":"Monday","workoutName":"Upper Body A","focus":"Chest, Back, Shoulders","duration":"50 min","isRest":false,"exercises":[{"name":"Barbell Bench Press","sets":4,"reps":"6-8","rest":"2min","notes":"Drive through floor","target":"4×8 @ 190lbs (+5lbs)"}]},{"dayName":"Tuesday","workoutName":"Rest","focus":"Recovery","duration":"","isRest":true,"exercises":[]}]}`;

  const text = await callAI([{ role: 'user', content: prompt }], 4000);
  const plan = extractJSON(text);
  if (!plan.days || plan.days.length !== 7) throw new Error(`Invalid plan: got ${plan.days?.length ?? 0} days`);
  return { ...plan, trainingDays: n };
}

// ─── SCREENS ──────────────────────────────────────────────────────────────────

// ─── API KEY SCREEN ───────────────────────────────────────────────────────────
function ApiKeyScreen({ onSaved }) {
  const [key, setKey] = useState('');
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState('');

  const save = async () => {
    const k = key.trim();
    if (!k.startsWith('sk-ant-')) { setErr('Key should start with sk-ant-…'); return; }
    setTesting(true); setErr('');
    setApiKey(k);
    try {
      await callAI([{ role: 'user', content: 'Reply with the single word: ready' }], 20);
      onSaved();
    } catch(e) {
      setErr('Key test failed: ' + e.message);
      setApiKey('');
    }
    setTesting(false);
  };

  return (
    <div className="screen" style={{alignItems:'center',justifyContent:'center',padding:'32px'}}>
      <div style={{width:'100%',maxWidth:'420px'}}>
        <div className="display" style={{fontSize:'52px',color:'var(--acc)',letterSpacing:'6px',marginBottom:'6px',textAlign:'center'}}>FORGE</div>
        <div className="label" style={{textAlign:'center',marginBottom:'32px'}}>AI Personal Trainer</div>

        <div style={{background:'var(--s1)',border:'1px solid var(--border)',padding:'24px',marginBottom:'20px'}}>
          <div style={{fontWeight:700,fontSize:'15px',marginBottom:'8px'}}>🔑 Enter your Anthropic API Key</div>
          <div style={{fontSize:'13px',color:'var(--muted2)',marginBottom:'16px',lineHeight:'1.6'}}>
            FORGE uses the Anthropic API to generate your workouts and coach you. Your key is stored only on this device and never sent anywhere except Anthropic.
          </div>
          <div style={{fontSize:'12px',color:'var(--muted2)',marginBottom:'16px',lineHeight:'1.6',background:'var(--s2)',padding:'10px 12px',borderLeft:'2px solid var(--acc)'}}>
            Get a free key at <strong style={{color:'var(--acc)'}}>console.anthropic.com</strong> → API Keys → Create Key
          </div>
          <div className="label" style={{marginBottom:'7px'}}>API Key</div>
          <input
            className="inp"
            type="password"

// ─── SETTINGS MODAL ───────────────────────────────────────────────────────────
function SettingsModal({ currentKey, onSaved, onClose }) {
  const [editing, setEditing] = useState(false);
  const [newKey, setNewKey] = useState('');
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState('');
  const [saved, setSaved] = useState(false);

  const maskedKey = currentKey ? '••••••••' + currentKey.slice(-8) : null;

  const save = async () => {
    const k = newKey.trim();
    if (!k.startsWith('sk-ant-')) { setErr('Key should start with sk-ant-…'); return; }
    setTesting(true); setErr('');
    setApiKey(k);
    try {
      await callAI([{ role: 'user', content: 'Reply with the single word: ready' }], 20);
      setSaved(true);
      onSaved();
      setTimeout(() => { setSaved(false); setEditing(false); setNewKey(''); }, 1200);
    } catch(e) {
      setErr('Key test failed: ' + e.message);
      setApiKey(currentKey || '');
    }
    setTesting(false);
  };

  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-sheet">
        <div className="display" style={{fontSize:'26px',marginBottom:'20px'}}>⚙ SETTINGS</div>

        {/* API Key section */}
        <div style={{background:'var(--s2)',border:'1px solid var(--border)',padding:'16px',marginBottom:'16px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}}>
            <div className="label">Anthropic API Key</div>
            {currentKey && !editing && (
              <span style={{fontSize:'11px',color:'var(--green)',letterSpacing:'1px',textTransform:'uppercase'}}>✓ Connected</span>
            )}
          </div>

          {!editing ? (
            <>
              <div style={{fontFamily:'var(--font-mono)',fontSize:'13px',color:'var(--muted2)',marginBottom:'12px',padding:'10px 12px',background:'var(--bg)',border:'1px solid var(--border)'}}>
                {maskedKey || <span style={{color:'var(--red)'}}>No key set</span>}
              </div>
              <button className="btn btn-ghost" style={{width:'100%'}} onClick={() => setEditing(true)}>
                {currentKey ? 'CHANGE KEY' : 'ADD KEY'}
              </button>
            </>
          ) : (
            <>
              <input className="inp" type="password" value={newKey}
                onChange={e => { setNewKey(e.target.value); setErr(''); }}
                placeholder="sk-ant-api03-..."
                style={{marginBottom:'8px'}}
                onKeyDown={e => e.key === 'Enter' && save()}
                autoFocus
              />
              {err && <div style={{color:'var(--red)',fontSize:'12px',marginBottom:'8px'}}>{err}</div>}
              {saved && <div style={{color:'var(--green)',fontSize:'12px',marginBottom:'8px'}}>✓ Key saved and verified!</div>}
              <div style={{display:'flex',gap:'8px'}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={() => { setEditing(false); setNewKey(''); setErr(''); }}>CANCEL</button>
                <button className="btn btn-acc" style={{flex:2}} disabled={!newKey.trim() || testing} onClick={save}>
                  {testing ? 'TESTING...' : 'SAVE & VERIFY →'}
                </button>
              </div>
            </>
          )}
        </div>

        {/* Info */}
        <div style={{fontSize:'12px',color:'var(--muted2)',lineHeight:'1.7',marginBottom:'20px'}}>
          Get your API key at <strong style={{color:'var(--acc)'}}>console.anthropic.com</strong> → API Keys.<br/>
          Your key is stored only on this device and sent only to Anthropic.<br/>
          Typical cost: ~$0.05–0.10 per week of training.
        </div>

        <button className="btn btn-ghost" style={{width:'100%'}} onClick={onClose}>CLOSE</button>
      </div>
    </div>
  );
}

// ONBOARDING
const STEPS = [
  { title: "WHAT'S YOUR GOAL?", sub: 'Choose your primary objective' },
  { title: 'EXPERIENCE LEVEL', sub: 'How long have you been training?' },
  { title: 'DAYS PER WEEK', sub: 'How many days can you commit to?' },

function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({});

  const sel = (key, val) => setData(p => ({ ...p, [key]: val }));

  const canNext = () => {
    if (step === 0) return !!data.goal;
    if (step === 1) return !!data.experience;
    if (step === 2) return !!data.days;
    if (step === 3) return !!data.equipment;
    return true;
  };

  const next = () => {
    if (step < STEPS.length - 1) setStep(s => s + 1);
    else onComplete({
      name: data.name?.trim() || 'Athlete',
      goal: data.goal,
      experience: data.experience,
      days: data.days,
      equipment: data.equipment,
      split: data.split?.trim() || '',
      notes: data.notes || ''
    });
  };

  return (
    <div className="screen">
      <div style={{padding:'52px 22px 0'}}>
        <div className="dots">
          {STEPS.map((_, i) => <div key={i} className={`dot${i < step ? ' done' : ''}`}/>)}
        </div>
        <div className="display" style={{fontSize:'clamp(32px,9vw,48px)',marginBottom:'6px'}}>{STEPS[step].title}</div>
        <div className="label" style={{marginBottom:'28px'}}>{STEPS[step].sub}</div>
      </div>
      <div className="page" style={{padding:'0 22px',paddingBottom:'100px'}}>
        {step === 0 && <div className="cgrid">
          {[['💪','Build Muscle'],['🔥','Lose Fat'],['🏋️','Build Strength'],['🏃','Improve Endurance']].map(([ic,v]) =>
            <button key={v} className={`cbtn${data.goal===v?' sel':''}`} onClick={()=>sel('goal',v)}><span className="ci">{ic}</span>{v}</button>
          )}
          <button className={`cbtn cspan${data.goal==='General Fitness'?' sel':''}`} onClick={()=>sel('goal','General Fitness')}><span className="ci">⚡</span>General Fitness</button>
        </div>}

        {step === 1 && <div className="cgrid">
          {[['🌱','Beginner (0-1 years)'],['📈','Intermediate (1-3 years)'],['🔱','Advanced (3+ years)']].map(([ic,v]) =>
            <button key={v} className={`cbtn cspan${data.experience===v?' sel':''}`} onClick={()=>sel('experience',v)}><span className="ci">{ic}</span>{v}</button>
          )}
        </div>}

        {step === 2 && <div className="cgrid">
          {[['2️⃣','2 days'],['3️⃣','3 days'],['4️⃣','4 days'],['5️⃣','5 days'],['6️⃣','6 days'],['🔄','4-5 days (flexible)']].map(([ic,v]) =>
            <button key={v} className={`cbtn${data.days===v?' sel':''}`} onClick={()=>sel('days',v)}><span className="ci">{ic}</span>{v}</button>
          )}
          <button className={`cbtn cspan${data.days==='Not sure — surprise me'?' sel':''}`} onClick={()=>sel('days','Not sure — surprise me')}><span className="ci">🎲</span>Not sure — let AI decide</button>
        </div>}

        {step === 3 && <div className="cgrid">
          {[['🏪','Full Gym'],['🏠','Home + Dumbbells']].map(([ic,v]) =>
            <button key={v} className={`cbtn${data.equipment===v?' sel':''}`} onClick={()=>sel('equipment',v)}><span className="ci">{ic}</span>{v}</button>
          )}
          <button className={`cbtn cspan${data.equipment==='Bodyweight Only'?' sel':''}`} onClick={()=>sel('equipment','Bodyweight Only')}><span className="ci">🧘</span>Bodyweight Only</button>
        </div>}

        {step === 4 && <>
          <div style={{marginBottom:'14px'}}>
            <div className="label" style={{marginBottom:'7px'}}>Your name</div>
            <input className="inp" value={data.name||''} onChange={e=>sel('name',e.target.value)} placeholder="e.g. Alex"/>
          </div>
          <div style={{marginBottom:'14px'}}>
            <div className="label" style={{marginBottom:'7px'}}>Preferred training split (optional)</div>
            <input className="inp" value={data.split||''} onChange={e=>sel('split',e.target.value)}

              Be as specific as you want — the AI will follow your instructions exactly.
            </div>
          </div>
          <div>
            <div className="label" style={{marginBottom:'7px'}}>How are you feeling? Injuries or notes?</div>
            <textarea className="inp" value={data.notes||''} onChange={e=>sel('notes',e.target.value)} placeholder="e.g. Feeling strong! Slight shoulder issue so avoid heavy overhead pressing."/>
          </div>
        </>}
      </div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'14px 22px 32px',background:'linear-gradient(transparent,var(--bg) 40%)'}}>

function ExerciseCard({ exercise, exIdx, sets, onUpdateSet, onToggleSet, onAddSet, onSwap, onRemove, onFeedback }) {
  const [open, setOpen] = useState(false);
  const [confirmRemove, setConfirmRemove] = useState(false);
  const [showFeedback, setShowFeedback] = useState(false);
  const [feedbackLoading, setFeedbackLoading] = useState(false);

  const FEEDBACK_OPTIONS = [
    ['😓', 'Too heavy — struggled'],
    ['😴', 'Fatigued / not recovered'],
    ['😌', 'Felt easy — could go heavier'],
    ['🤕', 'Pain or discomfort'],
    ['✅', 'Felt perfect as prescribed'],
  ];

  const submitFeedback = async (reason) => {
    setShowFeedback(false);
    setFeedbackLoading(true);
    const completedSets = sets.filter(s => s.weight || s.reps);
    const loggedStr = completedSets.map(s => `${s.weight||'?'}lbs×${s.reps||'?'}`).join(', ');
    try {
      const text = await callAI([{ role: 'user', content:
        `An athlete is mid-workout and gave feedback on an exercise.
Exercise: ${exercise.name}
Prescribed: ${exercise.sets}×${exercise.reps}${exercise.target ? ' (target: ' + exercise.target + ')' : ''}
Logged so far: ${loggedStr || 'not started yet'}
Feedback: "${reason}"

Adjust the remaining sets for this exercise. Return ONLY JSON:
{"adjustedSets": [{"weight": 135, "reps": 8}, {"weight": 135, "reps": 8}], "message": "one sentence explaining the adjustment"}
- adjustedSets should cover however many sets are remaining (total sets minus completed).
- If feedback is positive, keep or increase slightly. If fatigued/heavy, reduce weight 5-10%, reduce reps, or both.` }], 200);
      const result = extractJSON(text);
      if (result.adjustedSets?.length) {
        onFeedback(exIdx, completedSets.length, result.adjustedSets, result.message);

          <div className="label" style={{marginBottom:'8px'}}>How did this feel?</div>
          <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
            {FEEDBACK_OPTIONS.map(([ic, label]) => (
              <button key={label}
                onClick={() => submitFeedback(label)}
                style={{background:'var(--s1)',border:'1px solid var(--border2)',color:'var(--txt)',padding:'9px 12px',fontSize:'13px',cursor:'pointer',fontFamily:'var(--font-body)',textAlign:'left',transition:'all 0.15s',display:'flex',alignItems:'center',gap:'10px'}}
                onMouseOver={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--acc)'}}
                onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.color='var(--txt)'}}
              >{ic} {label}</button>
            ))}
          </div>
        </div>
      )}

      {confirmRemove && (
        <div className="rm-confirm">
          <span style={{fontSize:'13px',color:'#ff8888'}}>Remove <strong>{exercise.name}</strong>?</span>
          <div style={{display:'flex',gap:'8px'}}>
            <button className="btn btn-ghost" style={{padding:'6px 12px',fontSize:'12px'}} onClick={()=>setConfirmRemove(false)}>CANCEL</button>
            <button className="btn btn-danger" style={{padding:'6px 14px',fontSize:'12px',background:'var(--red)',color:'#fff',border:'none'}} onClick={()=>onRemove(exIdx)}>REMOVE</button>
          </div>
        </div>

      {open && (
        <div className="ex-body">
          <div style={{fontSize:'12px',color:'var(--muted2)',marginBottom:'12px',fontStyle:'italic'}}>{exercise.notes}</div>
          <div style={{display:'flex',gap:'8px',marginBottom:'8px'}}>
            <div className="label" style={{flex:1,textAlign:'center'}}>WEIGHT</div>
            <div className="label" style={{flex:1,textAlign:'center'}}>REPS</div>
            <div style={{width:'30px'}}/>
          </div>
          {sets.map((set, si) => (
            <SetRow key={si} set={set} setIdx={si} exIdx={exIdx}
              onUpdate={onUpdateSet} onToggle={onToggleSet}/>
          ))}
          <button
            onClick={() => onAddSet(exIdx)}
            style={{width:'100%',background:'transparent',border:'1px dashed var(--border2)',color:'var(--muted2)',padding:'8px',fontSize:'12px',cursor:'pointer',fontFamily:'var(--font-body)',letterSpacing:'1px',textTransform:'uppercase',marginTop:'4px',transition:'all 0.15s'}}
            onMouseOver={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--acc)'}}
            onMouseOut={e=>{e.currentTarget.style.borderColor='var(--border2)';e.currentTarget.style.color='var(--muted2)'}}
          >+ ADD SET</button>
        </div>
      )}
    </div>
  );
}

function WorkoutScreen({ dayIdx, weekPlan, profile, sets, isReopening, onUpdateSet, onToggleSet, onAddSet, onSwap, onRemove, onAddExercise, onFinish, onBack, onVoiceLog, onFeedback, coachTip, coachLoading }) {
  const day = weekPlan.days[dayIdx];
  const exercises = day.exercises;

  const [voiceActive, setVoiceActive] = useState(false);
  const [voiceText, setVoiceText] = useState('');
  const [voiceParsing, setVoiceParsing] = useState(false);
  const srRef = useRef(null);

  const mins = useMemo(() => estimateWorkoutMins(exercises), [exercises]);
  const totalSets = useMemo(() => exercises.reduce((a, ex) => a + (ex.sets || 3), 0), [exercises]);

  // Parse final transcript into set data via AI
  const parseVoiceIntoSets = async (transcript) => {
    setVoiceParsing(true);
    setVoiceText('Logging: "' + transcript + '"');
    const exNames = exercises.map((e, i) => `${i}: ${e.name}`).join(', ');
    try {
      const text = await callAI([{ role: 'user', content:
        `Parse this voice log into workout set data.
Voice: "${transcript}"
Exercises in this workout (by index): ${exNames}

Return ONLY JSON: {"exerciseIndex": 0, "sets": [{"weight": 135, "reps": 8}, {"weight": 135, "reps": 8}]}
- Match the exercise name as closely as possible to find the right index.
- If weight is not mentioned, use null.
- If you cannot parse it, return {"exerciseIndex": -1, "sets": []}` }], 200);
      const parsed = extractJSON(text);
      if (parsed.exerciseIndex >= 0 && parsed.sets?.length) {
        onVoiceLog(parsed.exerciseIndex, parsed.sets);
        setVoiceText(`✓ Logged ${parsed.sets.length} set${parsed.sets.length > 1 ? 's' : ''} for ${exercises[parsed.exerciseIndex]?.name}`);
      } else {
        setVoiceText('Could not match to an exercise — try again or log manually.');
      }
    } catch(e) {
      setVoiceText('Voice log failed: ' + e.message);
    }
    setVoiceParsing(false);
  };

  const toggleVoice = async () => {
    if (voiceActive) {
      srRef.current?.stop();
      setVoiceActive(false);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      alert('Voice input is not supported in this browser.\n\niOS: Use Safari\nAndroid: Use Chrome');
      return;
    }
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(permErr) {
      alert('Microphone access denied. Please allow microphone access in your browser settings and try again.');
      return;
    }
    const sr = new SR();
    sr.continuous = false; sr.interimResults = true; sr.lang = 'en-US';
    let finalTranscript = '';
    sr.onresult = e => {
      const t = Array.from(e.results).map(r => r[0].transcript).join('');
      setVoiceText(t);
      if (e.results[e.results.length - 1].isFinal) finalTranscript = t;
    };
    sr.onerror = e => {
      console.error('Speech recognition error:', e.error);
      setVoiceActive(false);
      if (e.error === 'not-allowed') alert('Microphone permission denied. Check your browser settings.');
      else if (e.error === 'no-speech') setVoiceText('No speech detected — try again.');
      else setVoiceText(`Voice error: ${e.error}`);
    };
    sr.onend = () => {
      setVoiceActive(false);
      if (finalTranscript.trim()) parseVoiceIntoSets(finalTranscript.trim());
    };
    srRef.current = sr;
    try {
      sr.start();
      setVoiceActive(true);
      setVoiceText('Listening… say e.g. "bench press 3 sets of 8 at 135"');
    } catch(startErr) {
      console.error('SR start error:', startErr);
      alert('Could not start voice recognition: ' + startErr.message);
    }
  };

  return (
    <div className="screen">
      {/* Header */}
      <div style={{background:'var(--s1)',borderBottom:'1px solid var(--border)',padding:'50px 20px 14px',flexShrink:0}}>
        <button className="btn btn-ghost" style={{padding:'6px 12px',fontSize:'12px',marginBottom:'12px'}} onClick={onBack}>← BACK</button>
        <div className="display" style={{fontSize:'clamp(32px,10vw,46px)'}}>{day.workoutName.toUpperCase()}</div>
        <div style={{fontSize:'13px',color:'var(--muted2)',marginTop:'3px'}}>{day.focus}</div>
      </div>

      {/* Time bar */}
      <div className="time-bar" style={{flexShrink:0}}>
        <div className={`tc${mins>90?' over':''}`}><span>⏱</span><span className="tv">~{formatMins(mins)}</span><span>est.</span></div>
        <div style={{width:'1px',height:'14px',background:'var(--border)'}}/>
        <div className="tc"><span>🏋️</span><span className="tv">{exercises.length}</span><span>exercises</span></div>
        <div style={{width:'1px',height:'14px',background:'var(--border)'}}/>
        <div className="tc"><span>📋</span><span className="tv">{totalSets}</span><span>sets</span></div>
      </div>

      {/* Scrollable content */}
      <div className="page" style={{paddingBottom:'90px'}}>
        <div style={{padding:'12px 16px 0'}}>
          {/* Reopen banner */}
          {isReopening && (
            <div style={{background:'rgba(68,255,170,0.08)',border:'1px solid var(--green)',borderLeft:'3px solid var(--green)',padding:'10px 14px',marginBottom:'12px',fontSize:'13px',color:'var(--green)'}}>
              ✏️ <strong>Editing completed workout</strong> — make your changes and hit Update when done.
            </div>
          )}

          {exercises.map((ex, ei) => (
            <ExerciseCard
              key={`${ei}-${ex.name}`}
              exercise={ex} exIdx={ei} sets={sets[ei] || []}
              onUpdateSet={onUpdateSet} onToggleSet={onToggleSet}
              onAddSet={onAddSet} onSwap={onSwap} onRemove={onRemove}
              onFeedback={onFeedback}
            />
          ))}

          {/* Add exercise */}
          <button
            onClick={onAddExercise}
            style={{width:'100%',background:'transparent',border:'1px dashed var(--acc)',color:'var(--acc)',padding:'14px',fontFamily:'var(--font-body)',fontSize:'13px',fontWeight:'600',letterSpacing:'1px',textTransform:'uppercase',cursor:'pointer',marginBottom:'16px',marginTop:'4px',transition:'all 0.15s',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(232,255,71,0.06)'}
            onMouseOut={e=>e.currentTarget.style.background='transparent'}
          >＋ ADD EXERCISE</button>

          {/* Voice */}
          <div style={{marginBottom:'14px'}}>
            <button
              onClick={toggleVoice}
              disabled={voiceParsing}
              style={{width:'100%',background:'var(--s1)',border:`1px solid ${voiceActive?'var(--red)':voiceParsing?'var(--acc2)':'var(--border2)'}`,color:voiceActive?'var(--red)':voiceParsing?'var(--acc2)':'var(--muted2)',padding:'14px',fontFamily:'var(--font-body)',fontSize:'13px',fontWeight:'600',letterSpacing:'1px',textTransform:'uppercase',cursor:voiceParsing?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',transition:'all 0.2s'}}
            >
              {voiceParsing ? '⏳ LOGGING...' : voiceActive ? '⏹ STOP RECORDING' : '🎙️ LOG WITH VOICE'}
            </button>
            {voiceText && (
              <div style={{background:'var(--s2)',border:'1px solid var(--border)',borderTop:'none',padding:'10px 14px',fontSize:'13px',color: voiceText.startsWith('✓') ? 'var(--green)' : 'var(--muted2)',fontStyle:'italic',lineHeight:'1.5'}}>
                {voiceText}
              </div>
            )}
          </div>

          {/* Coach tip */}
          <div className="card card-acc2" style={{marginBottom:'16px'}}>
            <div className="label-acc" style={{color:'var(--acc2)',marginBottom:'7px'}}>🤖 FORGE COACH</div>
            {coachLoading ? <div className="thinking"><div className="td"/><div className="td"/><div className="td"/></div>
              : <div style={{fontSize:'13px',lineHeight:'1.7',color:'#ccc'}}>{coachTip}</div>}
          </div>

          {/* Finish */}
          <button className="btn btn-acc2" style={{width:'100%',marginBottom:'24px'}} onClick={onFinish}>
            {isReopening ? '💾 UPDATE WORKOUT' : '✅ FINISH WORKOUT'}
          </button>
        </div>
      </div>
    </div>
  );
}

// HISTORY ENTRY DETAIL
function HistoryEntryDetail({ entry }) {
  const { loggedSets, exercises, summary, isPrior } = entry;

  // Imported / prior entries — just show the summary text
  if (isPrior || !exercises || !loggedSets) {
    return (
      <div style={{borderTop:'1px solid var(--border)',padding:'12px 16px',background:'var(--s2)'}}>
        <div style={{fontSize:'13px',color:'#ccc',lineHeight:'1.7',whiteSpace:'pre-wrap'}}>{summary}</div>
      </div>
    );
  }

  return (
    <div style={{borderTop:'1px solid var(--border)',background:'var(--s2)'}}>
      {exercises.map((ex, ei) => {
        const sets = loggedSets[ei] || [];
        const logged = sets.filter(s => s.weight || s.reps || s.done);
        return (
          <div key={ei} style={{padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'6px'}}>
              <div style={{fontWeight:600,fontSize:'13px'}}>{ex.name}</div>
              {ex.target && (
                <div style={{fontSize:'11px',color:'var(--green)',fontFamily:'var(--font-mono)'}}>
                  🎯 {ex.target}
                </div>
              )}
            </div>
            {logged.length > 0 ? (
              <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
                {logged.map((s, si) => (
                  <div key={si} style={{
                    background: s.done ? 'rgba(68,255,170,0.1)' : 'var(--s3)',
                    border: `1px solid ${s.done ? 'rgba(68,255,170,0.3)' : 'var(--border2)'}`,
                    padding:'4px 10px', fontSize:'12px', fontFamily:'var(--font-mono)',
                    color: s.done ? 'var(--green)' : 'var(--muted2)',
                    display:'flex', gap:'4px', alignItems:'center'
                  }}>
                    <span style={{color:'var(--muted)',fontSize:'10px'}}>S{si+1}</span>
                    {s.weight ? <span>{s.weight}lbs</span> : null}
                    {s.weight && s.reps ? <span style={{color:'var(--border2)'}}>×</span> : null}
                    {s.reps ? <span>{s.reps} reps</span> : null}
                    {!s.weight && !s.reps ? <span style={{color:'var(--muted)'}}>—</span> : null}
                    {s.done && <span style={{fontSize:'10px'}}>✓</span>}
                  </div>
                ))}
              </div>
            ) : (
              <div style={{fontSize:'12px',color:'var(--muted)',fontStyle:'italic'}}>No sets logged</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// HISTORY SCREEN
function HistoryScreen({ history }) {
  const [expanded, setExpanded] = useState(null);

  if (!history.length) return (
    <div className="screen">
      <div style={{padding:'52px 20px 16px'}}>
        <div className="label" style={{marginBottom:'3px'}}>Your</div>
        <div className="display" style={{fontSize:'44px'}}>HISTORY</div>
      </div>
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'12px',color:'var(--muted2)',padding:'40px',textAlign:'center'}}>
        <div style={{fontSize:'40px'}}>📋</div>
        <p style={{fontSize:'14px',lineHeight:'1.6'}}>No workouts logged yet.<br/>Complete your first session to see history here.</p>
      </div>
    </div>
  );

  const toggleExpand = (i) => setExpanded(prev => prev === i ? null : i);
  const reversed = [...history].reverse();

  return (
    <div className="screen">
      <div style={{padding:'52px 20px 16px',flexShrink:0}}>

              >
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:'8px'}}>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px',flexWrap:'wrap'}}>
                      <span className="label">{h.date}{h.week > 0 ? ` · Week ${h.week}` : ''}</span>
                      {h.isPrior && <span className="chip chip-acc2">IMPORTED</span>}
                    </div>
                    <div style={{fontWeight:700,fontSize:'15px',marginBottom:'3px'}}>{h.workoutName}</div>
                    <div style={{fontSize:'12px',color:'var(--muted2)'}}>{h.focus ? h.focus+' · ' : ''}{h.summary}</div>
                  </div>
                  {hasDetail && (
                    <div style={{color:'var(--muted2)',fontSize:'14px',transition:'transform 0.2s',transform:isOpen?'rotate(180deg)':'none',flexShrink:0,marginTop:'2px'}}>▼</div>
                  )}
                </div>

                {/* Exercise count chips */}
                {h.exercises?.length > 0 && (
                  <div style={{display:'flex',gap:'6px',marginTop:'8px',flexWrap:'wrap'}}>
                    {h.exercises.map((ex, ei) => {
                      const sets = h.loggedSets?.[ei] || [];
                      const doneSets = sets.filter(s => s.done || s.reps || s.weight).length;
                      return (
                        <div key={ei} style={{fontSize:'11px',padding:'3px 8px',background:'var(--s2)',border:'1px solid var(--border2)',color: doneSets > 0 ? 'var(--muted2)' : 'var(--muted)',fontFamily:'var(--font-mono)'}}>
                          {ex.name.length > 18 ? ex.name.slice(0,16)+'…' : ex.name} · {doneSets}/{sets.length}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>

              {/* Expanded detail */}
              {isOpen && <HistoryEntryDetail entry={h}/>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// IMPORT PRIOR HISTORY
function ImportScreen({ profile, onImported }) {
  const [tab, setTab] = useState('free');
  const [freeText, setFreeText] = useState('');
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(false);
  const [toast, setToast] = useState('');
  const [voiceActive, setVoiceActive] = useState(false);
  const srRef = useRef(null);

  const toggleVoice = async () => {
    if (voiceActive) { srRef.current?.stop(); setVoiceActive(false); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Voice not supported. Use Safari on iOS or Chrome on Android.'); return; }
    try { await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch { alert('Microphone access denied. Allow mic access in browser settings.'); return; }
    const sr = new SR();
    sr.continuous = true; // keep listening until stopped — good for describing workouts
    sr.interimResults = true; sr.lang = 'en-US';
    sr.onresult = e => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join(' ');
      setFreeText(transcript);
    };
    sr.onerror = e => { console.error('SR error:', e.error); setVoiceActive(false); };
    sr.onend = () => setVoiceActive(false);
    srRef.current = sr;
    try { sr.start(); setVoiceActive(true); }
    catch(err) { alert('Could not start voice: ' + err.message); }
  };

  const addSession = () => setSessions(s => [...s, { id: Date.now(), date: '', name: '', notes: '' }]);
  const updateSession = (id, key, val) => setSessions(s => s.map(x => x.id === id ? { ...x, [key]: val } : x));
  const removeSession = (id) => setSessions(s => s.filter(x => x.id !== id));

  const importFree = async () => {
    if (!freeText.trim()) return;
    setLoading(true);
    try {
      const text = await callAI([{ role: 'user', content:
        `Parse this workout history into sessions. Goal: ${profile.goal}, Equipment: ${profile.equipment}.
History: "${freeText}"
Return ONLY a JSON array with no extra text: [{"date":"approx date e.g. 2 weeks ago","workoutName":"Push Day","focus":"Chest, Shoulders","summary":"Bench 3x8@185, OHP 3x10@115","strengthBaseline":"Bench: 185x8"}]` }], 1500);
      const parsed = extractJSON(text);
      if (!Array.isArray(parsed)) throw new Error('Response was not an array');
      onImported(parsed.map(s => ({ date: s.date, dayIndex: -1, week: 0, workoutName: s.workoutName, focus: s.focus||'', summary: s.summary, isPrior: true })), freeText);
      setToast(`✓ ${parsed.length} sessions imported!`);
    } catch(e) {
      console.error('Import error:', e);
      setToast('Import failed: ' + e.message);
    }
    setLoading(false);
  };

  const saveSessions = () => {
    const valid = sessions.filter(s => s.name || s.notes);
    if (!valid.length) return;
    const summary = valid.map(s => `${s.date||'Prior'}: ${s.name} — ${s.notes}`).join('\n');
    onImported(valid.map(s => ({ date: s.date||'Prior', dayIndex:-1, week:0, workoutName:s.name||'Session', focus:'', summary:s.notes, isPrior:true })), summary);
    setToast(`✓ ${valid.length} sessions saved!`);
  };

  return (
    <div className="screen">
      <div style={{padding:'52px 20px 16px',flexShrink:0}}>
        <div className="label" style={{marginBottom:'3px'}}>Import</div>
        <div className="display" style={{fontSize:'44px'}}>HISTORY</div>
        <div style={{fontSize:'13px',color:'var(--muted2)',marginTop:'6px',lineHeight:'1.6'}}>Log past workouts so the AI baselines your fitness from day one.</div>
      </div>
      <div className="mtabs" style={{margin:'0 20px 0',flexShrink:0}}>
        <button className={`mtab${tab==='free'?' active':''}`} onClick={()=>setTab('free')}>📝 Quick Import</button>
        <button className={`mtab${tab==='sessions'?' active':''}`} onClick={()=>setTab('sessions')}>📋 Session by Session</button>
      </div>
      <div className="page" style={{padding:'16px 20px 0'}}>
        {tab === 'free' && <>
          <div style={{fontSize:'13px',color:'var(--muted2)',marginBottom:'12px',lineHeight:'1.6'}}>Describe your recent training in plain English — type it or use your voice.</div>

          {/* Voice button */}
          <button
            onClick={toggleVoice}
            style={{width:'100%',background:'var(--s1)',border:`1px solid ${voiceActive?'var(--red)':'var(--border2)'}`,color:voiceActive?'var(--red)':'var(--muted2)',padding:'12px',fontFamily:'var(--font-body)',fontSize:'13px',fontWeight:600,letterSpacing:'1px',textTransform:'uppercase',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',marginBottom:'10px',transition:'all 0.2s'}}
          >
            🎙️ {voiceActive ? '⏹ STOP — TAP TO FINISH' : 'DESCRIBE WITH VOICE'}
          </button>
          {voiceActive && (
            <div style={{fontSize:'12px',color:'var(--acc2)',marginBottom:'8px',textAlign:'center',letterSpacing:'1px',textTransform:'uppercase'}}>
              🔴 Listening — just talk naturally about your workouts...
            </div>
          )}

          <textarea className="inp" style={{minHeight:'140px',marginBottom:'14px'}} value={freeText} onChange={e=>setFreeText(e.target.value)}
            placeholder="e.g. Last 2 weeks I've been doing Push/Pull/Legs 4x/week. Push: bench 3x8@185, OHP 3x10@115. Pull: pull-ups 4x8, rows 3x10@155. Legs: squat 4x6@225, RDL 3x10@185..."/>
          <button className="btn btn-acc" style={{width:'100%',marginBottom:'16px'}} disabled={loading||!freeText.trim()} onClick={importFree}>
            {loading ? 'ANALYZING...' : 'IMPORT & ANALYZE →'}
          </button>
        </>}

        {tab === 'sessions' && <>
          <div style={{fontSize:'13px',color:'var(--muted2)',marginBottom:'12px',lineHeight:'1.6'}}>Add individual sessions with details.</div>
          {sessions.map((s) => (
            <div key={s.id} className="pscard">
              <div className="pshdr" onClick={e => { const b = e.currentTarget.nextSibling; b.classList.toggle('open'); }}>
                <div style={{flex:1}}>
                  <div className="label">{s.date||'No date'}</div>
                  <div style={{fontWeight:600,fontSize:'14px',marginTop:'2px'}}>{s.name||'Unnamed Session'}</div>
                </div>
                <button onClick={e=>{e.stopPropagation();removeSession(s.id)}} style={{background:'none',border:'none',color:'var(--red)',fontSize:'20px',cursor:'pointer'}}>×</button>
              </div>
              <div className="psbody">
                <div style={{marginBottom:'10px'}}>
                  <div className="label" style={{marginBottom:'6px'}}>Date</div>
                  <input className="inp" type="date" value={s.date} onChange={e=>updateSession(s.id,'date',e.target.value)} style={{padding:'10px 12px'}}/>
                </div>

            onMouseOver={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--acc)'}}

// CHAT
function ChatScreen({ profile, weekPlan, weekNum, history, onClose }) {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [voiceActive, setVoiceActive] = useState(false);
  const bottomRef = useRef(null);
  const srRef = useRef(null);
  const taRef = useRef(null);

  useEffect(() => {
    if (!msgs.length) {
      setMsgs([{ role: 'ai', text: `Hey ${profile?.name||'there'}! I'm your FORGE coach. Your goal is **${profile?.goal}** and you're in week ${weekNum}. Ask me anything — training, form, recovery, or what's next. What's on your mind?` }]);
    }
  }, []);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    setInput('');
    if (taRef.current) taRef.current.style.height = '';
    const newMsgs = [...msgs, { role: 'user', text }];
    setMsgs(newMsgs);
    setLoading(true);

    const ctx = `You are FORGE, an expert AI personal trainer. Be specific, motivating, and concise (under 180 words unless a plan is requested). Use **bold** for key points.
User: ${profile?.name}, Goal: ${profile?.goal}, Experience: ${profile?.experience}, Equipment: ${profile?.equipment}. Week ${weekNum}: ${weekPlan?.weekTheme}. Recent: ${history.slice(-3).map(h=>h.workoutName).join(', ')||'none'}.`;

    try {
      const apiMsgs = newMsgs.slice(-10).map(m => ({
        role: m.role === 'ai' ? 'assistant' : 'user',
        content: m.role === 'user' && m === newMsgs[newMsgs.length-1] ? `${ctx}\n\n${m.text}` : m.text
      }));
      const reply = await callAI(apiMsgs, 500);
      setMsgs(p => [...p, { role: 'ai', text: reply }]);
    } catch {
      setMsgs(p => [...p, { role: 'ai', text: 'Connection issue — try again in a moment!' }]);
    }
    setLoading(false);
  };

  const toggleVoice = async () => {
    if (voiceActive) { srRef.current?.stop(); setVoiceActive(false); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Voice not supported. Use Safari on iOS or Chrome on Android.'); return; }
    try { await navigator.mediaDevices.getUserMedia({ audio: true }); }
    catch { alert('Microphone access denied. Allow mic access in browser settings.'); return; }
    const sr = new SR();
    sr.continuous = false; sr.interimResults = true; sr.lang = 'en-US';
    sr.onresult = e => { setInput(Array.from(e.results).map(r=>r[0].transcript).join('')); };
    sr.onerror = e => { console.error('SR error:', e.error); setVoiceActive(false); };
    sr.onend = () => setVoiceActive(false);
    srRef.current = sr;
    try { sr.start(); setVoiceActive(true); } catch(err) { alert('Voice error: ' + err.message); }
  };

  return (
    <div className="screen">
      <div style={{background:'var(--s1)',borderBottom:'1px solid var(--border)',padding:'50px 20px 14px',flexShrink:0,display:'flex',alignItems:'center',gap:'14px'}}>
        <button style={{background:'none',border:'none',color:'var(--muted2)',fontSize:'20px',cursor:'pointer',padding:0,lineHeight:1}} onClick={onClose}>←</button>
        <div>
          <div className="display" style={{fontSize:'28px',letterSpacing:'3px'}}>FORGE AI</div>
          <div style={{fontSize:'12px',color:'var(--muted2)',marginTop:'1px'}}>Your personal coach</div>
        </div>
      </div>
      <div className="page" style={{padding:'16px 16px 0',display:'flex',flexDirection:'column',gap:'12px'}}>
        {msgs.map((m, i) => (
          <div key={i} className={`msg ${m.role}`} dangerouslySetInnerHTML={{ __html: formatAI(m.text) }}/>
        ))}
        {loading && <div className="msg ai"><div className="thinking"><div className="td"/><div className="td"/><div className="td"/></div></div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{background:'var(--s1)',borderTop:'1px solid var(--border)',padding:`10px 14px calc(14px + var(--safe-bottom))`,display:'flex',gap:'8px',alignItems:'flex-end',flexShrink:0}}>
        <button
          onClick={toggleVoice}
          style={{width:'44px',height:'44px',background:voiceActive?'rgba(255,68,85,0.12)':'var(--s2)',border:`1px solid ${voiceActive?'var(--red)':'var(--border2)'}`,color:voiceActive?'var(--red)':'var(--muted2)',fontSize:'18px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.2s'}}
        >🎙️</button>
        <textarea
          ref={taRef}
          className="inp"
          style={{flex:1,minHeight:'44px',maxHeight:'110px',padding:'11px 13px',fontSize:'14px',lineHeight:'1.5'}}
          rows={1}
          value={input}
          onChange={e => { setInput(e.target.value); e.target.style.height='auto'; e.target.style.height=Math.min(e.target.scrollHeight,110)+'px'; }}
          onKeyDown={e => { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }}
          placeholder="Ask your coach anything..."
        />
        <button
          onClick={send}
          disabled={loading||!input.trim()}
          style={{width:'44px',height:'44px',background:'var(--acc)',border:'none',cursor:'pointer',fontSize:'17px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s'}}
        >➤</button>
      </div>
    </div>
  );
}

// SWAP MODAL
function SwapModal({ exercise, exIdx, profile, disliked, currentExercises, onSwap, onClose }) {
  const [reason, setReason] = useState('');
  const [notes, setNotes] = useState('');
  const [loading, setLoading] = useState(false);

  const REASONS = [
    ['😓','Too difficult right now'],['🏗️','Wrong equipment'],
    ['🤕','Causes pain / discomfort'],['🙅','Just don\'t like it'],
  ];

  const submit = async () => {
    if (!reason) return;
    setLoading(true);

    // Build a comprehensive exclusion list: disliked + all current exercises (except the one being swapped)
    const dislikedNames = disliked.map(d => d.name);
    const otherCurrentNames = currentExercises
      .filter((_, i) => i !== exIdx)
      .map(e => e.name);
    const excludeAll = [...new Set([...dislikedNames, ...otherCurrentNames])];
    const excludeStr = excludeAll.length ? excludeAll.join(', ') : 'none';

    try {
      const text = await callAI([{ role:'user', content:
        `Suggest ONE exercise to replace "${exercise.name}" (${exercise.sets}×${exercise.reps}, rest ${exercise.rest}).
Workout focus: ${currentExercises.map(e=>e.name).join(', ')}.
Reason for swap: ${reason}. Notes: ${notes||'none'}.
Equipment: ${profile.equipment}. Goal: ${profile.goal}. Experience: ${profile.experience}.

CRITICAL: Do NOT suggest any of these exercises (already in workout or previously rejected): ${excludeStr}
The replacement MUST be a different exercise not on that list.

Return ONLY JSON: {"name":"...","sets":3,"reps":"8-10","rest":"60s","notes":"coaching cue","reason":"why this is a great swap"}` }], 300);

      const rep = extractJSON(text);

      // Client-side safety check — if AI still returned a duplicate, reject it
      const isDuplicate = otherCurrentNames.some(n =>
        n.toLowerCase().trim() === rep.name.toLowerCase().trim()
      );
      if (isDuplicate) {
        alert(`The AI suggested "${rep.name}" but that's already in your workout. Tap "Find Replacement" again for a different suggestion.`);
        setLoading(false);
        return;
      }

      onSwap(exIdx, rep, reason);
    } catch(err) {
      console.error('Swap error:', err);
      alert('Could not find replacement: ' + err.message);
    }
    setLoading(false);
  };

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-sheet">
        <div className="display" style={{fontSize:'26px',marginBottom:'4px'}}>SWAP EXERCISE</div>
        <div style={{color:'var(--acc2)',fontSize:'14px',fontWeight:600,marginBottom:'16px'}}>{exercise.name}</div>
        <div className="label" style={{marginBottom:'10px'}}>Why don't you want to do this?</div>
        <div className="cgrid" style={{marginBottom:'14px'}}>
          {REASONS.map(([ic,v]) => (
            <button key={v} className={`cbtn${reason===v?' sel':''}`} onClick={()=>setReason(v)}>{ic} {v}</button>
          ))}
          <button className={`cbtn cspan${reason==='Too easy — need harder variation'?' sel':''}`} onClick={()=>setReason('Too easy — need harder variation')}>🔥 Too easy — need harder variation</button>
        </div>
        <div style={{marginBottom:'14px'}}>
          <div className="label" style={{marginBottom:'7px'}}>Extra notes (optional)</div>
          <input className="inp" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="e.g. bad shoulder, prefer dumbbells..." style={{padding:'11px 13px'}}/>
        </div>
        <div style={{display:'flex',gap:'10px'}}>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>CANCEL</button>
          <button className="btn btn-acc" style={{flex:2}} disabled={!reason||loading} onClick={submit}>
            {loading ? 'FINDING...' : 'FIND REPLACEMENT →'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ADD EXERCISE MODAL
function AddExerciseModal({ day, profile, disliked, onAdd, onClose }) {
  const [mode, setMode] = useState('ai');
  const [aiPrompt, setAiPrompt] = useState('');
  const [pending, setPending] = useState(null);
  const [loading, setLoading] = useState(false);
  const [customName, setCustomName] = useState('');
  const [customSets, setCustomSets] = useState('3');
  const [customReps, setCustomReps] = useState('10-12');
  const [customRest, setCustomRest] = useState('60s');

  const suggest = async () => {
    setLoading(true); setPending(null);
    const dislikedNames = disliked.map(d => d.name);
    const existingNames = day.exercises.map(e => e.name);
    const excludeAll = [...new Set([...existingNames, ...dislikedNames])];
    const excludeStr = excludeAll.join(', ');
    try {
      const text = await callAI([{ role:'user', content:
        `Suggest ONE exercise to add to ${day.workoutName} (${day.focus}).
Equipment: ${profile.equipment}. Goal: ${profile.goal}. Experience: ${profile.experience}.
Request: "${aiPrompt||'something complementary to round out the session'}".

CRITICAL: The workout already contains these exercises — do NOT suggest any of them: ${excludeStr}
You MUST suggest a completely different exercise not on that list.

Return ONLY JSON: {"name":"...","sets":3,"reps":"10-12","rest":"60s","notes":"coaching cue","reason":"why this fits"}` }], 300);
      const result = extractJSON(text);

      // Client-side duplicate check
      const isDuplicate = existingNames.some(n =>
        n.toLowerCase().trim() === result.name.toLowerCase().trim()
      );
      if (isDuplicate) {
        alert(`The AI suggested "${result.name}" but that's already in your workout. Tap Suggest Again for a different one.`);
        setLoading(false);
        return;
      }
      setPending(result);
    } catch(err) {
      console.error('Add exercise error:', err);
      alert('Could not get suggestion: ' + err.message);
    }
    setLoading(false);
  };

  const confirm = () => {
    if (mode === 'ai' && pending) { onAdd(pending); }
    else if (mode === 'custom' && customName.trim()) {
      onAdd({ name:customName.trim(), sets:parseInt(customSets)||3, reps:customReps||'10-12', rest:customRest||'60s', notes:'Added manually', reason:'' });

  const canConfirm = mode === 'ai' ? !!pending : !!customName.trim();

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-sheet">
        <div className="display" style={{fontSize:'26px',marginBottom:'4px'}}>ADD EXERCISE</div>
        <div style={{fontSize:'13px',color:'var(--muted2)',marginBottom:'16px',lineHeight:'1.5'}}>Add something extra or describe exactly what you want.</div>
        <div className="mtabs">
          <button className={`mtab${mode==='ai'?' active':''}`} onClick={()=>{setMode('ai');setPending(null);}}>🤖 AI Suggest</button>
          <button className={`mtab${mode==='custom'?' active':''}`} onClick={()=>{setMode('custom');setPending(null);}}>✏️ I Know What I Want</button>
        </div>

        {mode === 'ai' && <>
          <div style={{marginBottom:'12px'}}>
            <div className="label" style={{marginBottom:'7px'}}>Any preferences? (optional)</div>
            <input className="inp" value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)} placeholder="e.g. rear delts, quick finisher, core work..." style={{padding:'11px 13px'}}/>
          </div>
          <button className="btn btn-acc" style={{width:'100%',marginBottom:'14px'}} disabled={loading} onClick={suggest}>
            {loading ? 'THINKING...' : pending ? 'SUGGEST AGAIN →' : 'SUGGEST EXERCISE →'}
          </button>
          {pending && (
            <div className="card card-green" style={{marginBottom:'14px'}}>
              <div style={{fontWeight:700,fontSize:'15px',marginBottom:'3px'}}>{pending.name}</div>
              <div style={{fontSize:'12px',color:'var(--muted2)',marginBottom:'5px'}}>{pending.sets} sets × {pending.reps} · Rest {pending.rest}</div>
              <div style={{fontSize:'12px',color:'#aaa',fontStyle:'italic'}}>{pending.reason}</div>
            </div>
          )}
        </>}

        {mode === 'custom' && (
          <div>
            <div style={{marginBottom:'12px'}}>
              <div className="label" style={{marginBottom:'7px'}}>Exercise name</div>
              <input className="inp" value={customName} onChange={e=>setCustomName(e.target.value)} placeholder="e.g. Cable Fly, Face Pull..." style={{padding:'11px 13px'}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'14px'}}>
              {[['Sets',customSets,setCustomSets,'number'],['Reps',customReps,setCustomReps,'text'],['Rest',customRest,setCustomRest,'text']].map(([lbl,val,setter,type])=>(
                <div key={lbl}>
                  <div className="label" style={{marginBottom:'6px'}}>{lbl}</div>
                  <input className="inp" type={type} value={val} onChange={e=>setter(e.target.value)} style={{padding:'9px 10px',textAlign:'center'}}/>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{display:'flex',gap:'10px',marginTop:'4px'}}>
          <button className="btn btn-ghost" style={{flex:1}} onClick={onClose}>CANCEL</button>
          <button className="btn btn-acc" style={{flex:2}} disabled={!canConfirm} onClick={confirm}>ADD TO WORKOUT →</button>
        </div>
      </div>
    </div>
  );
}
