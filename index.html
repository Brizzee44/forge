*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{background:#080808;color:#f0f0f0;font-family:'Segoe UI',system-ui,sans-serif;overscroll-behavior:none}
:root{--bg:#080808;--s1:#111;--s2:#181818;--border:#2a2a2a;--border2:#383838;--acc:#e8ff47;--acc2:#ff6b35;--green:#44ffaa;--red:#ff4455;--txt:#f0f0f0;--muted:#555;--muted2:#777;--safe:env(safe-area-inset-bottom,0px)}

.sd{width:30px;height:30px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted2);transition:all .15s;flex-shrink:0}.sd.on{background:var(--green);border-color:var(--green);color:#000}
.tb{background:var(--s2);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;gap:13px;flex-wrap:wrap}
.tc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted2)}.tc .tv{font-family:'Courier New',monospace;font-size:13px;color:var(--acc);font-weight:700}

.dc.td_{border-color:var(--acc);background:rgba(232,255,71,.04)}.dc.dn{border-color:var(--green);opacity:.7}.dc.rs{opacity:.45}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:15px}.csp{grid-column:1/-1}
.cb{background:var(--s1);border:1px solid var(--border2);color:var(--txt);padding:13px 9px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4}
.cb:hover,.cb.sel{border-color:var(--acc);background:rgba(232,255,71,.07);color:var(--acc)}.cb .ci{font-size:19px;display:block;margin-bottom:4px}

.tkg{display:flex;gap:5px;align-items:center;padding:9px}.td2{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bnc 1.1s infinite}.td2:nth-child(2){animation-delay:.18s}.td2:nth-child(3){animation-delay:.36s}

<script>
(function(){
'use strict';
var e=React.createElement,
    useState=React.useState,useEffect=React.useEffect,useRef=React.useRef,
    useCallback=React.useCallback,useMemo=React.useMemo;

// ── CONSTANTS
var STORE='forge_r2',API='https://api.anthropic.com/v1/messages',MDL='claude-sonnet-4-20250514';
var SPLITS={2:'Full Body A/B',3:'Push/Pull/Legs',4:'Upper/Lower/Upper/Lower',5:'PPL/Upper/Lower',6:'PPL/PPL'};
var BASELINE_LIFTS=[
  {cat:'Upper Push',lifts:['Bench Press','Overhead Press','Incline Bench Press','Dumbbell Shoulder Press']},
  {cat:'Upper Pull',lifts:['Barbell Row','Pull-Up / Lat Pulldown','Dumbbell Row','Cable Row']},
  {cat:'Lower',lifts:['Squat','Deadlift','Romanian Deadlift','Leg Press','Hip Thrust']},
  {cat:'Arms / Accessories',lifts:['Barbell Curl','Tricep Pushdown','Dips','Face Pull']}
];

// ── API KEY
var _key=localStorage.getItem('forge_key')||'';
function getKey(){return _key;}
function saveKey(k){_key=k;localStorage.setItem('forge_key',k);}

// ── AI CALL
function callAI(msgs,maxTok){
  maxTok=maxTok||1000;
  var k=getKey();
  if(!k) return Promise.reject(new Error('No API key. Tap Settings.'));
  return fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true','x-api-key':k},
    body:JSON.stringify({model:MDL,max_tokens:maxTok,messages:msgs})
  }).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error('API '+r.status+': '+t);});
    return r.json();
  }).then(function(d){
    if(d.error) throw new Error(d.error.message);
    return d.content.map(function(c){return c.text||'';}).join('');
  });
}

// ── HELPERS
function jparse(txt){
  var s=txt.replace(/```json|```/gi,'').trim();
  try{return JSON.parse(s);}catch(e1){}
  var a=s.indexOf('{'),b=s.lastIndexOf('}');
  if(a>-1&&b>a)try{return JSON.parse(s.slice(a,b+1));}catch(e2){}
  var c=s.indexOf('['),d=s.lastIndexOf(']');
  if(c>-1&&d>c)try{return JSON.parse(s.slice(c,d+1));}catch(e3){}
  throw new Error('JSON parse failed');
}
function pdays(s){s=s||'';if(s.includes('flexible')||s.includes('4-5'))return 5;if(s.includes('sure')||s.includes('surprise'))return 4;var m=s.match(/(\d+)/);return m?Math.min(Math.max(+m[1],2),6):4;}
function rsecs(s){s=s||'';var lo=s.toLowerCase(),m=lo.match(/(\d+)\s*min/),sec=lo.match(/(\d+)\s*s/);return(m?+m[1]*60:0)+(sec?+sec[1]:0)||60;}
function areps(s){s=s||'';var r=s.match(/(\d+)\s*[-]\s*(\d+)/);if(r)return(+r[1]+ +r[2])/2;var n=s.match(/(\d+)/);return n?+n[1]:10;}
function emins(exs){var t=300;(exs||[]).forEach(function(ex){t+=(ex.sets||3)*(areps(ex.reps)*4+rsecs(ex.rest))+60;});return Math.round(t/60);}
function fmins(m){return m>=60?Math.floor(m/60)+'h '+(m%60)+'m':m+' min';}
function tday(){return new Date().toLocaleDateString('en-US',{weekday:'long'});}

function useLS(key,init){
  var pair=useState(function(){
    try{var s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch(e){return init;}
  });
  var v=pair[0],sv=pair[1];
  var set=useCallback(function(fn){
    sv(function(prev){
      var next=typeof fn==='function'?fn(prev):fn;
      try{localStorage.setItem(key,JSON.stringify(next));}catch(e){}
      return next;
    });
  },[key]);
  return[v,set];
}

function buildLog(hist,wk,plan){
  var ents=(hist||[]).filter(function(h){return h.week===wk&&!h.isPrior;});
  if(!ents.length)return'';
  return ents.map(function(ent){
    var day=plan&&plan.days&&plan.days.find(function(d){return d.workoutName===ent.workoutName;});
    if(!ent.loggedSets||!day)return ent.workoutName+': '+ent.summary;
    var lines=day.exercises.map(function(ex,ei){
      var s=(ent.loggedSets[ei]||[]).filter(function(x){return x.weight||x.reps;});
      return'  '+ex.name+': '+(s.length?s.map(function(x){return(x.weight||'?')+'x'+(x.reps||'?');}).join(', '):'no data');
    }).join('\n');
    return ent.workoutName+':\n'+lines;
  }).join('\n\n');
}

function genPlan(profile,weekNum,prior,lastLog,oneRMs){
  weekNum=weekNum||1;prior=prior||'';lastLog=lastLog||'';oneRMs=oneRMs||{};
  var n=pdays(profile.days),sh=SPLITS[n]||SPLITS[4];
  var sr=profile.split?'SPLIT REQUIRED: "'+profile.split+'" follow exactly.':'Split AI chooses, suggest: '+sh+' for '+n+' days.';
  var pr=prior?'\nPRIOR TRAINING:\n'+prior+'\n':'';
  var lc=lastLog?'\nLAST WEEK DATA:\n'+lastLog+'\n':'';
  var pg=lastLog?'\nFor exercises with last-week data add "target" e.g. "4x8@190lbs(+5lbs)". ~5lb upper/~10lb lower progression.':'';
  var rmKeys=Object.keys(oneRMs).filter(function(k){return oneRMs[k];});
  var rmCtx=rmKeys.length?'\nSTRENGTH BASELINE (1RMs):\n'+rmKeys.map(function(k){return'  '+k+': '+oneRMs[k]+'lbs';}).join('\n')+'\nUse these to calculate working weights for ALL exercises (5x5=85%, 4x8=75%, 3x10=70%, 3x12=65% of 1RM). Include weight in every "target" field e.g. "4x8@155lbs".':'';
  var tgtRule=rmKeys.length?'Every exercise MUST have a "target" field with calculated weight.':'Add "target" field where you have data.';
  var prompt='You are FORGE AI trainer. Create week '+weekNum+' plan.'+pr+lc+rmCtx+'\nAthlete: name='+profile.name+', goal='+profile.goal+', exp='+profile.experience+', equip='+profile.equipment+', notes='+(profile.notes||'none')+'\n'+sr+pg+'\nRules: 1)Exactly 7 days Mon-Sun. 2)Exactly '+n+' isRest:false, '+(7-n)+' isRest:true. 3)4-5 exercises per training day. 4)Exercises suit: '+profile.equipment+'. 5)Each: name,sets(num),reps(str),rest(str),notes(str),target(str). 6)Different focus each training day. 7)'+tgtRule+'\nJSON only:\n{"weekTheme":"...","insight":"...","days":[{"dayName":"Monday","workoutName":"Push Day","focus":"Chest","duration":"50 min","isRest":false,"exercises":[{"name":"Bench Press","sets":4,"reps":"6-8","rest":"2min","notes":"full ROM","target":"4x8@155lbs"}]},{"dayName":"Tuesday","workoutName":"Rest","focus":"Recovery","duration":"","isRest":true,"exercises":[]}]}';
  return callAI([{role:'user',content:prompt}],4000).then(function(txt){
    var pl=jparse(txt);
    if(!pl.days||pl.days.length!==7)throw new Error('Bad plan: '+(pl.days&&pl.days.length)+' days');
    return Object.assign({},pl,{n:n});
  });
}

function fallback(p){
  return{weekTheme:'Foundation Week',insight:'Welcome '+p.name+'! Building your foundation for '+p.goal+'. Focus on form.',n:4,days:[
    {dayName:'Monday',workoutName:'Upper Body A',focus:'Chest, Back',duration:'50 min',isRest:false,exercises:[{name:'Bench Press',sets:4,reps:'6-8',rest:'2min',notes:'Full ROM',target:''},{name:'Barbell Row',sets:4,reps:'6-8',rest:'2min',notes:'Flat back',target:''},{name:'Overhead Press',sets:3,reps:'8-10',rest:'90s',notes:'Brace core',target:''},{name:'Pull-Up',sets:3,reps:'8-10',rest:'90s',notes:'Full stretch',target:''}]},

    {dayName:'Saturday',workoutName:'Rest',focus:'Recovery',duration:'',isRest:true,exercises:[]},
    {dayName:'Sunday',workoutName:'Rest',focus:'Recovery',duration:'',isRest:true,exercises:[]}
  ]};
}

// ── VOICE HELPER
function startVoice(onResult,onEnd,onError){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice not supported. Use Safari(iOS) or Chrome.');return Promise.resolve(null);}
  return navigator.mediaDevices.getUserMedia({audio:true}).then(function(){
    var sr=new SR();sr.continuous=false;sr.interimResults=true;sr.lang='en-US';
    var final='';
    sr.onresult=function(ev){var t=Array.from(ev.results).map(function(r){return r[0].transcript;}).join('');onResult(t);if(ev.results[ev.results.length-1].isFinal)final=t;};
    sr.onerror=function(ev){if(onError)onError(ev.error);};
    sr.onend=function(){if(onEnd)onEnd(final);};
    sr.start();return sr;
  }).catch(function(){alert('Mic permission denied.');return null;});
}

// ── PWA
function setupPWA(){
  try{
    var c=document.createElement('canvas');c.width=c.height=512;
    var ctx=c.getContext('2d');
    ctx.fillStyle='#080808';ctx.fillRect(0,0,512,512);
    ctx.strokeStyle='#e8ff47';ctx.lineWidth=14;ctx.strokeRect(18,18,476,476);
    ctx.fillStyle='#e8ff47';ctx.font='bold 140px Arial Black,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('FORGE',256,200);
    ctx.fillStyle='#555';ctx.font='52px Arial,sans-serif';ctx.fillText('AI TRAINER',256,310);
