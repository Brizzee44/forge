// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [appState, setAppState] = useLocalStorage(STORAGE_KEY, {
    profile: null, weekPlan: null, weekNum: 1,
    history: [], priorSummary: '', disliked: []
  });

  const [screen, setScreen] = useState('splash');
  const [tab, setTab] = useState('dashboard');
  const [genMsg, setGenMsg] = useState('Building your personalized plan...');
  const [showSettings, setShowSettings] = useState(false);

  // Workout state — not persisted (session only)
  const [workoutDayIdx, setWorkoutDayIdx] = useState(null);
  const workoutDayIdxRef = useRef(null); // stable ref for callbacks
  const [workoutSets, setWorkoutSets] = useState({});
  const [coachTip, setCoachTip] = useState('');
  const [coachLoading, setCoachLoading] = useState(false);

  // Modal state
  const [swapTarget, setSwapTarget] = useState(null);  // exIdx
  const [showAddEx, setShowAddEx] = useState(false);
  const [showMissed, setShowMissed] = useState(false);
  const [showChat, setShowChat] = useState(false);
  const [toast, setToast] = useState('');

  // PWA install
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstall, setShowInstall] = useState(false);

  useEffect(() => {
    const key = getApiKey();
    if (key) _apiKey = key;
    // Always start on splash — user explicitly chooses to continue or restart
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); setInstallPrompt(e);
      setTimeout(() => { if (!window.matchMedia('(display-mode: standalone)').matches) setShowInstall(true); }, 3500);
    });
    setupPWA();
  }, []);

  // ── Voice log — parse transcript into set updates ──
  const handleVoiceLog = useCallback((exerciseIndex, parsedSets) => {
    parsedSets.forEach((s, si) => {
      // Fill existing set slots, or they'll be added via onAddSet if needed
      setWorkoutSets(prev => {
        const current = prev[exerciseIndex] || [];
        const updated = [...current];
        if (si < updated.length) {
          updated[si] = {
            ...updated[si],
            weight: s.weight != null ? String(s.weight) : updated[si].weight,
            reps: s.reps != null ? String(s.reps) : updated[si].reps,
            done: true,
          };
        } else {
          updated.push({
            weight: s.weight != null ? String(s.weight) : '',
            reps: s.reps != null ? String(s.reps) : '',
            done: true,
          });
        }
        return { ...prev, [exerciseIndex]: updated };
      });
    });
  }, []);

  // ── Exercise feedback — adjust remaining sets on the fly ──
  const handleExerciseFeedback = useCallback((ei, completedCount, adjustedSets, message) => {
    setWorkoutSets(prev => {
      const current = [...(prev[ei] || [])];
      // Keep completed sets, replace remaining with adjusted values
      adjustedSets.forEach((s, i) => {
        const targetIdx = completedCount + i;
        if (targetIdx < current.length) {
          current[targetIdx] = { ...current[targetIdx], weight: s.weight != null ? String(s.weight) : current[targetIdx].weight, reps: s.reps != null ? String(s.reps) : current[targetIdx].reps };
        } else {
          current.push({ weight: s.weight != null ? String(s.weight) : '', reps: s.reps != null ? String(s.reps) : '', done: false });
        }
      });
      return { ...prev, [ei]: current };
    });
    if (message) setCoachTip(message);
    setToast('Sets adjusted based on your feedback');
  }, []);

  const updateState = (patch) => setAppState(s => ({ ...s, ...patch }));
  const handleOnboardComplete = async (profile) => {
    updateState({ profile });
    setScreen('generating');
    setGenMsg('Building your personalized plan...');
    try {
      const plan = await generatePlan(profile, 1, appState.priorSummary);
      updateState({ weekPlan: plan, weekNum: 1 });
      setScreen('main'); setTab('dashboard');
    } catch(e) {
      console.error(e);
      // offline fallback
      updateState({ weekPlan: fallbackPlan(profile), weekNum: 1 });
      setScreen('main'); setTab('dashboard');
    }
  };

  const [isReopening, setIsReopening] = useState(false);

  // ── Start workout ──
  const handleStartWorkout = async (dayIdx, reopening = false) => {
    const day = appState.weekPlan.days[dayIdx];

    // If reopening, try to restore logged sets from history
    const initSets = {};
    if (reopening) {
      const histEntry = [...appState.history].reverse().find(h => h.dayIndex === dayIdx && h.week === appState.weekNum);
      day.exercises.forEach((ex, ei) => {
        // Restore saved sets if available, otherwise blank
        const saved = histEntry?.loggedSets?.[ei];
        initSets[ei] = saved || Array.from({ length: ex.sets }, () => ({ weight: '', reps: '', done: false }));
      });
    } else {
      day.exercises.forEach((ex, ei) => {
        initSets[ei] = Array.from({ length: ex.sets }, () => ({ weight: '', reps: '', done: false }));
      });
    }

    setWorkoutDayIdx(dayIdx);
    workoutDayIdxRef.current = dayIdx;
    setWorkoutSets(initSets);
    setIsReopening(reopening);
    setCoachTip(''); setCoachLoading(true);
    setScreen('workout');

    try {
      const tip = await callAI([{ role:'user', content:
        `Give a brief 2-sentence coaching tip for ${day.workoutName} (${day.focus}). Goal: ${appState.profile.goal}, Experience: ${appState.profile.experience}. Be specific and motivating.` }], 150);
      setCoachTip(tip);
    } catch { setCoachTip(`Focus on controlled form throughout ${day.workoutName}. Quality reps beat sloppy heavy ones every time — own each set.`); }
    setCoachLoading(false);
  };

  // ── Set operations (stable references using functional updates) ──
  const handleUpdateSet = useCallback((ei, si, field, val) => {
    setWorkoutSets(prev => {
      const next = { ...prev };
      next[ei] = prev[ei].map((s, i) => i === si ? { ...s, [field]: val } : s);
      return next;
    });
  }, []);

  const handleToggleSet = useCallback((ei, si) => {
    setWorkoutSets(prev => {
      const next = { ...prev };
      next[ei] = prev[ei].map((s, i) => i === si ? { ...s, done: !s.done } : s);
      return next;
    });
  }, []);

  const handleAddSet = useCallback((ei) => {
    const dayIdx = workoutDayIdxRef.current;
    setWorkoutSets(prev => ({ ...prev, [ei]: [...(prev[ei]||[]), { weight:'', reps:'', done:false }] }));
    setAppState(prev => {
      const plan = JSON.parse(JSON.stringify(prev.weekPlan));
      if (plan.days[dayIdx]?.exercises[ei]) plan.days[dayIdx].exercises[ei].sets++;
      return { ...prev, weekPlan: plan };
    });
  }, []);

  // ── Remove exercise ──
  const handleRemoveExercise = useCallback((ei) => {
    const dayIdx = workoutDayIdxRef.current;
    setAppState(prev => {
      const plan = JSON.parse(JSON.stringify(prev.weekPlan));
      plan.days[dayIdx].exercises.splice(ei, 1);
      return { ...prev, weekPlan: plan };
    });
    setWorkoutSets(prev => {
      const next = {};
      Object.keys(prev).forEach(k => {
        const idx = parseInt(k);
        if (idx < ei) next[idx] = prev[idx];
        else if (idx > ei) next[idx - 1] = prev[idx];
      });
      return next;
    });
    setToast('Exercise removed');
  }, []);

  // ── Swap exercise ──
  const handleSwapConfirm = useCallback((ei, replacement, oldName, reason) => {
    const dayIdx = workoutDayIdxRef.current;
    setAppState(prev => {
      const plan = JSON.parse(JSON.stringify(prev.weekPlan));
      plan.days[dayIdx].exercises[ei] = replacement;
      return {
        ...prev,
        weekPlan: plan,
        disliked: [...(prev.disliked||[]), { name: oldName, reason }]
      };
    });
    setWorkoutSets(prev => ({
      ...prev,
      [ei]: Array.from({ length: replacement.sets }, () => ({ weight:'', reps:'', done:false }))
    }));
    setSwapTarget(null);
    setCoachTip(`Swapped to ${replacement.name}! ${replacement.reason || ''}`);
    setToast(`Swapped to ${replacement.name}`);
  }, []);

  // ── Add exercise ──
  const handleAddExercise = useCallback((ex) => {
    const dayIdx = workoutDayIdxRef.current;
    let newEi;
    setAppState(prev => {
      const plan = JSON.parse(JSON.stringify(prev.weekPlan));
      newEi = plan.days[dayIdx].exercises.length;
      plan.days[dayIdx].exercises.push(ex);
      return { ...prev, weekPlan: plan };
    });
    // Use functional update so we get the real current length
    setWorkoutSets(prev => {
      const ei = Object.keys(prev).length;
      return { ...prev, [ei]: Array.from({ length: ex.sets }, () => ({ weight:'', reps:'', done:false })) };
    });
    setShowAddEx(false);
    setCoachTip(`Added ${ex.name}! ${ex.reason||'Great addition to round out the session.'}`);
    setToast(`Added ${ex.name}`);
  }, []);

  // ── Finish workout ──
  const handleFinishWorkout = async () => {
    const day = appState.weekPlan.days[workoutDayIdx];
    const summary = day.exercises.map((ex, ei) => {
      const doneSets = (workoutSets[ei]||[]).filter(s => s.done || s.reps);
      return `${ex.name}: ${doneSets.length}×`;
    }).join(', ');

    const entry = {
      date: new Date().toLocaleDateString(),
      dayIndex: workoutDayIdx, week: appState.weekNum,
      workoutName: day.workoutName, focus: day.focus,
      summary, isPrior: false,
      loggedSets: { ...workoutSets },
      exercises: day.exercises.map(ex => ({ name: ex.name, sets: ex.sets, reps: ex.reps, target: ex.target || null })),
    };

    let newHistory;
    if (isReopening) {
      // Replace the existing entry for this day/week instead of adding a duplicate
      newHistory = appState.history.map(h =>
        h.dayIndex === workoutDayIdx && h.week === appState.weekNum ? entry : h
      );
    } else {
      newHistory = [...appState.history, entry];
    }

    const workoutDays = appState.weekPlan.days.filter(d => !d.isRest);
    const completedThisWeek = newHistory.filter(h => h.week === appState.weekNum && !h.isPrior).length;

    setScreen('main'); setTab('dashboard');
    setWorkoutDayIdx(null); setWorkoutSets({}); setIsReopening(false);

    if (!isReopening && completedThisWeek >= workoutDays.length) {
      updateState({ history: newHistory });
      const newWeek = appState.weekNum + 1;
      setGenMsg(`Week complete! Building Week ${newWeek}...`);
      setScreen('generating');
      const lastLog = buildLastWeekLog(newHistory, appState.weekNum, appState.weekPlan);
      try {
        const plan = await generatePlan(appState.profile, newWeek, appState.priorSummary, lastLog);
        updateState({ weekPlan: plan, weekNum: newWeek, history: newHistory });
      } catch {
        updateState({ weekPlan: fallbackPlan(appState.profile), weekNum: newWeek, history: newHistory });
      }
      setScreen('main'); setTab('dashboard');
    } else {
      updateState({ history: newHistory });
      setToast(isReopening ? 'Workout updated! 💪' : 'Workout logged! 💪');
    }
  };

  // ── Missed days adapt ──
  const handleMissedAdapted = (plan) => {
    updateState({ weekPlan: plan });
    setShowMissed(false);
    setToast('Plan adapted!');
  };

  // ── Prior history import ──
  const handleImported = (entries, summary) => {
    updateState({
      history: [...appState.history, ...entries],
      priorSummary: (appState.priorSummary ? appState.priorSummary + '\n' : '') + summary
    });
    setTab('dashboard');
    setToast(`${entries.length} sessions imported!`);
  };

  // ── Splash start ──
  const handleSplashStart = () => {
    if (!getApiKey()) {
      // No key yet — open settings first
      setShowSettings(true);
      return;
    }
    if (appState.profile && appState.weekPlan) {
      setScreen('main'); setTab('dashboard');
    } else {
      updateState({ profile:null, weekPlan:null, weekNum:1, history:[], priorSummary:'', disliked:[] });
      setScreen('onboard');
    }
  };

  const [apiKeySet, setApiKeySet] = useState(() => !!getApiKey());
  const hasData = !!(appState.profile && appState.weekPlan);

  // Derive currentDay fresh from state every render so modals always see latest exercises
  const currentDay = (workoutDayIdx !== null && appState.weekPlan)
    ? appState.weekPlan.days[workoutDayIdx]
    : null;

  return (
    <div style={{position:'relative',width:'100%',height:'100%',overflow:'hidden'}}>
      {screen === 'splash' && <Splash onStart={handleSplashStart} hasData={hasData} onManageKey={() => setShowSettings(true)}/>}
      {screen === 'onboard' && <Onboarding onComplete={handleOnboardComplete}/>}
      {screen === 'generating' && <Generating message={genMsg}/>}

      {screen === 'main' && !showChat && (
        <>
          {tab === 'dashboard' && (
            <Dashboard
              state={appState}
              onStartWorkout={handleStartWorkout}
              onOpenChat={() => setShowChat(true)}
              onMissedDays={() => setShowMissed(true)}
              onOpenSettings={() => setShowSettings(true)}
            />
          )}
          {tab === 'history' && <HistoryScreen history={appState.history}/>}
          {tab === 'import' && (
            <ImportScreen profile={appState.profile} onImported={handleImported}/>
          )}
          {/* Bottom Nav */}
          <nav className="nav">
            {[['🏠','Home','dashboard'],['📊','History','history'],['📥','Import','import']].map(([ic,lbl,t])=>(
              <button key={t} className={`nav-item${tab===t?' active':''}`} onClick={()=>setTab(t)}>
                <span className="ni">{ic}</span><span className="nl">{lbl}</span>
              </button>
            ))}
            <button className="nav-item" onClick={()=>setShowChat(true)}>
              <span className="ni">🤖</span><span className="nl">Coach</span>
            </button>
          </nav>
        </>
      )}

      {screen === 'workout' && workoutDayIdx !== null && (
        <WorkoutScreen
          dayIdx={workoutDayIdx}
          weekPlan={appState.weekPlan}
          profile={appState.profile}
          sets={workoutSets}
          isReopening={isReopening}
          onUpdateSet={handleUpdateSet}
          onToggleSet={handleToggleSet}
          onAddSet={handleAddSet}
          onSwap={ei => setSwapTarget(ei)}
          onRemove={handleRemoveExercise}
          onAddExercise={() => setShowAddEx(true)}
          onFinish={handleFinishWorkout}
          onBack={() => { setScreen('main'); setTab('dashboard'); }}
          onVoiceLog={handleVoiceLog}
          onFeedback={handleExerciseFeedback}
          coachTip={coachTip}
          coachLoading={coachLoading}
        />
      )}

      {showChat && (
        <ChatScreen
          profile={appState.profile}
          weekPlan={appState.weekPlan}
          weekNum={appState.weekNum}
          history={appState.history}
          onClose={() => setShowChat(false)}
        />
      )}

      {/* Modals — rendered outside screen checks so they appear on any screen */}
      {swapTarget !== null && currentDay && currentDay.exercises[swapTarget] && (
        <SwapModal
          exercise={currentDay.exercises[swapTarget]}
          exIdx={swapTarget}
          profile={appState.profile}
          disliked={appState.disliked||[]}
          currentExercises={currentDay.exercises}
          onSwap={(ei, replacement, reason) => handleSwapConfirm(ei, replacement, currentDay.exercises[ei]?.name || '', reason)}
          onClose={() => setSwapTarget(null)}
        />
      )}

      {showAddEx && currentDay && (
        <AddExerciseModal
          day={currentDay}
          profile={appState.profile}
          disliked={appState.disliked||[]}
          onAdd={handleAddExercise}
          onClose={() => setShowAddEx(false)}
        />
      )}

      {showMissed && (
        <MissedDaysModal
          profile={appState.profile}
          weekPlan={appState.weekPlan}
          weekNum={appState.weekNum}
          history={appState.history}
          onAdapted={handleMissedAdapted}
          onClose={() => setShowMissed(false)}
        />
      )}

      {showSettings && (
        <SettingsModal
          currentKey={getApiKey()}
          onSaved={() => {
            setApiKeySet(true);
            // If opened from splash with no key, proceed to onboard/main after saving
            if (screen === 'splash') {
              if (appState.profile && appState.weekPlan) { setScreen('main'); setShowSettings(false); }
            }
          }}
          onClose={() => setShowSettings(false)}
        />
      )}

      {/* Install banner */}
      {showInstall && installPrompt && (
        <div className="install-banner">
          <span style={{fontSize:'22px'}}>📲</span>
          <div style={{flex:1}}>
            <div style={{fontSize:'13px',fontWeight:700,color:'var(--acc)',letterSpacing:'1px'}}>INSTALL FORGE</div>
            <div style={{fontSize:'11px',color:'var(--muted2)',marginTop:'2px'}}>Add to home screen for gym use</div>
          </div>
          <button className="btn btn-acc" style={{padding:'8px 14px',fontSize:'12px'}}
            onClick={async()=>{ installPrompt.prompt(); await installPrompt.userChoice; setInstallPrompt(null); setShowInstall(false); }}>
            INSTALL
          </button>
          <button onClick={()=>setShowInstall(false)} style={{background:'none',border:'none',color:'var(--muted2)',fontSize:'20px',cursor:'pointer',padding:'0 2px'}}>×</button>
        </div>
      )}

      {toast && <Toast msg={toast} onDone={()=>setToast('')}/>}
    </div>
  );
}

// ─── PWA ──────────────────────────────────────────────────────────────────────
function setupPWA() {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#080808'; ctx.fillRect(0,0,512,512);
  ctx.strokeStyle = '#e8ff47'; ctx.lineWidth = 16;
  ctx.strokeRect(20,20,472,472);
  ctx.fillStyle = '#e8ff47'; ctx.font = 'bold 148px Arial Black,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('FORGE', 256, 210);
  ctx.fillStyle = '#555'; ctx.font = '52px Arial,sans-serif';
  ctx.fillText('AI TRAINER', 256, 320);
  const ic = canvas.toDataURL('image/png');
  document.getElementById('apple-icon').href = ic;

  const manifest = {
    name:'FORGE — AI Personal Trainer', short_name:'FORGE',
    description:'Your AI-powered personal trainer', start_url:'.',
    display:'standalone', background_color:'#080808', theme_color:'#080808',
    orientation:'portrait', icons:[
      {src:ic,sizes:'192x192',type:'image/png',purpose:'any maskable'},
      {src:ic,sizes:'512x512',type:'image/png',purpose:'any maskable'}
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);

  if ('serviceWorker' in navigator) {
    const sw = `
const C='forge-r1';
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add(self.location.href)).then(()=>self.skipWaiting())));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));
self.addEventListener('fetch',e=>{
  if(e.request.url.includes('anthropic.com')||e.request.url.includes('googleapis')||e.request.url.includes('cdnjs')){
    e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503})));return;
  }
  e.respondWith(caches.match(e.request).then(c=>{
    if(c)return c;
    return fetch(e.request).then(r=>{
      if(r&&r.status===200){const cl=r.clone();caches.open(C).then(ca=>ca.put(e.request,cl));}
      return r;
    }).catch(()=>caches.match(e.request));
  }));
});`;
    const swBlob = new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob),{scope:'./'}).catch(()=>{});
  }
}

// ─── MOUNT ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
