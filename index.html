<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<title>FORGE — AI Trainer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#080808;color:#f0f0f0;font-family:'Segoe UI',system-ui,sans-serif;overscroll-behavior:none}
:root{--bg:#080808;--s1:#111;--s2:#181818;--border:#2a2a2a;--border2:#383838;--acc:#e8ff47;--acc2:#ff6b35;--green:#44ffaa;--red:#ff4455;--txt:#f0f0f0;--muted:#555;--muted2:#777;--safe:env(safe-area-inset-bottom,0px)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg)}
.page{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.page::-webkit-scrollbar{display:none}
.nav{position:absolute;bottom:0;left:0;right:0;height:calc(56px + var(--safe));padding-bottom:var(--safe);background:var(--s1);border-top:1px solid var(--border);display:flex;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;padding:5px 2px}
.nb .ni{font-size:18px}.nb .nl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}.nb.on .nl{color:var(--acc)}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;font-weight:700;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;border:none;cursor:pointer;transition:all .15s;padding:13px 18px}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.ba{background:var(--acc);color:#000}.ba:hover{background:#fff}
.ba2{background:var(--acc2);color:#fff}
.bg{background:transparent;border:1px solid var(--border2);color:var(--muted2)}.bg:hover{border-color:var(--acc);color:var(--acc)}
.inp{width:100%;background:var(--s2);border:1px solid var(--border);color:var(--txt);padding:12px 14px;font-family:inherit;font-size:15px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--acc)}.inp::placeholder{color:var(--muted)}
textarea.inp{resize:none;min-height:80px;line-height:1.6}
.card{background:var(--s1);border:1px solid var(--border);padding:13px}
.chip{display:inline-flex;align-items:center;padding:3px 8px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid}
.ca{color:var(--acc);border-color:var(--acc)}.cg{color:var(--green);border-color:var(--green)}.ca2{color:var(--acc2);border-color:var(--acc2)}.cm{color:var(--muted2);border-color:var(--border2)}
.lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.mb{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);display:flex;align-items:flex-end;justify-content:center}
.ms{background:var(--s1);border-top:1px solid var(--border2);width:100%;max-width:640px;padding:24px 19px calc(30px + var(--safe));max-height:88vh;overflow-y:auto}.ms::-webkit-scrollbar{display:none}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.ec{background:var(--s1);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.eh{padding:11px 13px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}.eh:active{background:var(--s2)}
.sr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.si{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--txt);padding:8px 4px;font-family:'Courier New',monospace;font-size:14px;outline:none;text-align:center;transition:border .2s}.si:focus{border-color:var(--acc)}
.sd{width:30px;height:30px;border:1px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted2);transition:all .15s;flex-shrink:0}.sd.on{background:var(--green);border-color:var(--green);color:#000}
.tb{background:var(--s2);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;gap:13px;flex-wrap:wrap}
.tc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted2)}.tc .tv{font-family:'Courier New',monospace;font-size:13px;color:var(--acc);font-weight:700}
.dc{background:var(--s1);border:1px solid var(--border);padding:13px 15px;display:flex;align-items:center;gap:11px;transition:all .15s}
.dc.td_{border-color:var(--acc);background:rgba(232,255,71,.04)}.dc.dn{border-color:var(--green);opacity:.7}.dc.rs{opacity:.45}
.cg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:15px}.csp{grid-column:1/-1}
.cb{background:var(--s1);border:1px solid var(--border2);color:var(--txt);padding:13px 9px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4}
.cb:hover,.cb.sel{border-color:var(--acc);background:rgba(232,255,71,.07);color:var(--acc)}.cb .ci{font-size:19px;display:block;margin-bottom:4px}
.dots{display:flex;gap:5px;margin-bottom:22px}.dot{height:3px;flex:1;background:var(--border);transition:background .3s}.dot.on{background:var(--acc)}
.mts{display:flex;border:1px solid var(--border2);margin-bottom:13px}.mt{flex:1;padding:10px;background:transparent;border:none;color:var(--muted2);font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}.mt.on{background:rgba(232,255,71,.08);color:var(--acc)}
.spin{width:38px;height:38px;border:2px solid var(--border2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.tkg{display:flex;gap:5px;align-items:center;padding:9px}.td2{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bnc 1.1s infinite}.td2:nth-child(2){animation-delay:.18s}.td2:nth-child(3){animation-delay:.36s}
@keyframes bnc{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.msg{max-width:86%;padding:10px 12px;font-size:14px;line-height:1.65;word-break:break-word}
.msg.u{align-self:flex-end;background:var(--acc);color:#000;font-weight:500}.msg.a{align-self:flex-start;background:var(--s2);border:1px solid var(--border)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--acc);color:var(--acc);padding:8px 16px;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;z-index:999;white-space:nowrap;animation:fup .3s ease}
@keyframes fup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hc{background:var(--s1);border:1px solid var(--border);margin-bottom:8px;overflow:hidden}
.sp{display:inline-flex;align-items:center;gap:3px;padding:3px 7px;font-family:'Courier New',monospace;font-size:11px;border:1px solid var(--border2);margin:2px;background:var(--s1);color:var(--muted2)}.sp.dn{border-color:rgba(68,255,170,.3);color:var(--green);background:rgba(68,255,170,.07)}
.tbar{background:rgba(68,255,170,.06);border-top:1px solid rgba(68,255,170,.15);padding:7px 13px;display:flex;align-items:center;gap:7px}
.fbb{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:1px;text-transform:uppercase;transition:all .15s;white-space:nowrap}.fbb:hover{border-color:var(--acc);color:var(--acc)}
.fbo{background:var(--s1);border:1px solid var(--border2);color:var(--txt);padding:9px 11px;font-size:13px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s;display:block;width:100%;margin-bottom:5px}.fbo:hover{border-color:var(--acc);color:var(--acc)}
.reb{width:100%;background:var(--s2);border:1px solid var(--border2);border-top:none;color:var(--muted2);padding:7px 14px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}.reb:hover{border-color:var(--acc);color:var(--acc);background:rgba(232,255,71,.04)}
.disp{font-weight:900;letter-spacing:2px;line-height:1}
.ibd{background:rgba(68,255,170,.07);border:1px solid rgba(68,255,170,.25);border-left:3px solid var(--green);padding:8px 12px;margin-bottom:9px;font-size:13px;color:var(--green)}
</style>
</head>
<body>
<div id="root">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#080808;gap:14px">
    <div style="font-size:62px;font-weight:900;letter-spacing:8px;color:#e8ff47">FORGE</div>
    <div style="font-size:12px;letter-spacing:3px;color:#555;text-transform:uppercase">Loading...</div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
(function() {
'use strict';

// Alias - e() = React.createElement, pure JS, zero compilation needed
const e = React.createElement;
const {useState, useEffect, useRef, useCallback, useMemo, Fragment} = React;

// ── CONSTANTS ─────────────────────────────────────────────────────────────
const STORE = 'forge_r2';
const API_URL = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-sonnet-4-20250514';
const SPLITS = {2:'Full Body A/B', 3:'Push/Pull/Legs', 4:'Upper/Lower/Upper/Lower', 5:'PPL/Upper/Lower', 6:'PPL/PPL'};

// ── API KEY ───────────────────────────────────────────────────────────────
let _key = localStorage.getItem('forge_key') || '';
const getKey = () => _key;
const saveKey = k => { _key = k; localStorage.setItem('forge_key', k); };

// ── AI CALL ───────────────────────────────────────────────────────────────
async function callAI(messages, maxTokens) {
  maxTokens = maxTokens || 1000;
  const k = getKey();
  if (!k) throw new Error('No API key. Tap Settings to add your key.');
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
      'x-api-key': k
    },
    body: JSON.stringify({model: MODEL, max_tokens: maxTokens, messages: messages})
  });
  if (!r.ok) { const t = await r.text(); throw new Error('API ' + r.status + ': ' + t); }
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content.map(function(c) { return c.text || ''; }).join('');
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function jparse(text) {
  const s = text.replace(/```json|```/gi, '').trim();
  try { return JSON.parse(s); } catch(e1) {}
  const a = s.indexOf('{'), b = s.lastIndexOf('}');
  if (a > -1 && b > a) try { return JSON.parse(s.slice(a, b+1)); } catch(e2) {}
  const c = s.indexOf('['), d = s.lastIndexOf(']');
  if (c > -1 && d > c) try { return JSON.parse(s.slice(c, d+1)); } catch(e3) {}
  throw new Error('JSON parse failed');
}
function pdays(s) {
  s = s || '';
  if (s.includes('flexible') || s.includes('4-5')) return 5;
  if (s.includes('sure') || s.includes('surprise')) return 4;
  const m = s.match(/(\d+)/); return m ? Math.min(Math.max(+m[1], 2), 6) : 4;
}
function rsecs(s) {
  s = s || ''; const lo = s.toLowerCase();
  const m = lo.match(/(\d+)\s*min/), sec = lo.match(/(\d+)\s*s/);
  return (m ? +m[1]*60 : 0) + (sec ? +sec[1] : 0) || 60;
}
function areps(s) {
  s = s || ''; const r = s.match(/(\d+)\s*[-\u2013]\s*(\d+)/);
  if (r) return (+r[1] + +r[2]) / 2;
  const n = s.match(/(\d+)/); return n ? +n[1] : 10;
}
function emins(exs) {
  let t = 300;
  (exs || []).forEach(function(ex) { t += (ex.sets||3)*(areps(ex.reps)*4 + rsecs(ex.rest)) + 60; });
  return Math.round(t / 60);
}
function fmins(m) { return m >= 60 ? Math.floor(m/60) + 'h ' + (m%60) + 'm' : m + ' min'; }
function tday() { return new Date().toLocaleDateString('en-US', {weekday:'long'}); }

function useLS(key, init) {
  const [v, sv] = useState(function() {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : init; } catch(e) { return init; }
  });
  const set = useCallback(function(fn) {
    sv(function(prev) {
      const next = typeof fn === 'function' ? fn(prev) : fn;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) {}
      return next;
    });
  }, [key]);
  return [v, set];
}

function buildLog(history, weekNum, plan) {
  const ents = (history || []).filter(function(h) { return h.week === weekNum && !h.isPrior; });
  if (!ents.length) return '';
  return ents.map(function(ent) {
    const day = plan && plan.days && plan.days.find(function(d) { return d.workoutName === ent.workoutName; });
    if (!ent.loggedSets || !day) return ent.workoutName + ': ' + ent.summary;
    const lines = day.exercises.map(function(ex, ei) {
      const s = (ent.loggedSets[ei] || []).filter(function(x) { return x.weight || x.reps; });
      return '  ' + ex.name + ': ' + (s.length ? s.map(function(x) { return (x.weight||'?')+'x'+(x.reps||'?'); }).join(', ') : 'no data');
    }).join('\n');
    return ent.workoutName + ':\n' + lines;
  }).join('\n\n');
}

async function genPlan(profile, weekNum, prior, lastLog, oneRMs) {
  weekNum = weekNum || 1; prior = prior || ''; lastLog = lastLog || ''; oneRMs = oneRMs || {};
  const n = pdays(profile.days), sh = SPLITS[n] || SPLITS[4];
  const sr = profile.split ? 'SPLIT REQUIRED: "' + profile.split + '" — follow exactly.' : 'Split AI chooses, suggest: ' + sh + ' for ' + n + ' days.';
  const pr = prior ? '\nPRIOR TRAINING:\n' + prior + '\n' : '';
  const lc = lastLog ? '\nLAST WEEK DATA:\n' + lastLog + '\n' : '';
  const pg = lastLog ? '\nFor each exercise with last-week data, add "target" field e.g. "4x8@190lbs(+5lbs)". ~5lb upper/~10lb lower progression.' : '';
  const rmEntries = Object.keys(oneRMs).filter(function(k){ return oneRMs[k]; });
  const rmCtx = rmEntries.length ?
    '\nSTRENGTH BASELINE (1 Rep Maxes):\n' + rmEntries.map(function(k){ return '  ' + k + ': ' + oneRMs[k] + 'lbs'; }).join('\n') +
    '\nUSE THESE to calculate realistic working weights for ALL exercises using standard percentage guidelines (e.g. 5x5=85%, 4x8=75%, 3x10=70%, 3x12=65%). For accessory lifts not listed, extrapolate from the closest compound lift. Always include weight in the "target" field for every exercise (e.g. "4x8@155lbs"). Do not guess — calculate from the 1RMs provided.' : '';
  const targetRule = rmEntries.length ?
    'IMPORTANT: Every exercise must have a "target" field with calculated weight based on the 1RM data above.' :
    'Add "target" field where you have last-week data.';
  const prompt = 'You are FORGE AI trainer. Create week ' + weekNum + ' plan.' + pr + lc + rmCtx +
    '\nAthlete: name=' + profile.name + ', goal=' + profile.goal + ', exp=' + profile.experience +
    ', equip=' + profile.equipment + ', notes=' + (profile.notes||'none') + '\n' + sr + pg +
    '\nRules: 1)Exactly 7 days Mon-Sun. 2)Exactly ' + n + ' isRest:false, ' + (7-n) + ' isRest:true. 3)4-5 exercises per training day. 4)Exercises suit: ' + profile.equipment + '. 5)Each exercise: name,sets(num),reps(str),rest(str),notes(str),target(str). 6)Different focus each training day. 7)' + targetRule +
    '\nReturn JSON only:\n{"weekTheme":"...","insight":"...","days":[{"dayName":"Monday","workoutName":"Push Day","focus":"Chest","duration":"50 min","isRest":false,"exercises":[{"name":"Bench Press","sets":4,"reps":"6-8","rest":"2min","notes":"full ROM","target":"4x8@155lbs"}]},{"dayName":"Tuesday","workoutName":"Rest","focus":"Recovery","duration":"","isRest":true,"exercises":[]}]}';
  const text = await callAI([{role:'user', content:prompt}], 4000);
  const pl = jparse(text);
  if (!pl.days || pl.days.length !== 7) throw new Error('Bad plan: ' + (pl.days && pl.days.length) + ' days');
  return Object.assign({}, pl, {n: n});
}

function fallback(p) {
  return {weekTheme:'Foundation Week', insight:'Welcome ' + p.name + '! Building your foundation for ' + p.goal + '. Focus on form — every rep counts.', n:4, days:[
    {dayName:'Monday',workoutName:'Upper Body A',focus:'Chest, Back',duration:'50 min',isRest:false,exercises:[{name:'Bench Press',sets:4,reps:'6-8',rest:'2min',notes:'Full ROM'},{name:'Barbell Row',sets:4,reps:'6-8',rest:'2min',notes:'Flat back'},{name:'Overhead Press',sets:3,reps:'8-10',rest:'90s',notes:'Brace core'},{name:'Pull-Up',sets:3,reps:'8-10',rest:'90s',notes:'Full stretch'}]},
    {dayName:'Tuesday',workoutName:'Lower Body A',focus:'Quads, Glutes',duration:'50 min',isRest:false,exercises:[{name:'Squat',sets:4,reps:'6-8',rest:'2min',notes:'Break parallel'},{name:'Romanian Deadlift',sets:3,reps:'8-10',rest:'90s',notes:'Hip hinge'},{name:'Leg Press',sets:3,reps:'12-15',rest:'75s',notes:'Full range'},{name:'Walking Lunges',sets:3,reps:'10 each',rest:'60s',notes:'Knee over toe'}]},
    {dayName:'Wednesday',workoutName:'Rest',focus:'Recovery',duration:'',isRest:true,exercises:[]},
    {dayName:'Thursday',workoutName:'Upper Body B',focus:'Shoulders, Arms',duration:'50 min',isRest:false,exercises:[{name:'Incline Dumbbell Press',sets:3,reps:'10-12',rest:'75s',notes:'Controlled'},{name:'Cable Row',sets:3,reps:'10-12',rest:'75s',notes:'Squeeze at peak'},{name:'Lateral Raise',sets:3,reps:'15-20',rest:'60s',notes:'Lead with elbows'},{name:'Tricep Pushdown',sets:3,reps:'12-15',rest:'60s',notes:'Elbows tucked'}]},
    {dayName:'Friday',workoutName:'Lower Body B',focus:'Hamstrings, Glutes',duration:'50 min',isRest:false,exercises:[{name:'Deadlift',sets:4,reps:'5-6',rest:'2.5min',notes:'Hips back'},{name:'Hack Squat',sets:3,reps:'10-12',rest:'90s',notes:'Control descent'},{name:'Leg Curl',sets:3,reps:'12-15',rest:'60s',notes:'Full ROM'},{name:'Hip Thrust',sets:3,reps:'12-15',rest:'60s',notes:'Drive hips hard'}]},
    {dayName:'Saturday',workoutName:'Rest',focus:'Recovery',duration:'',isRest:true,exercises:[]},
    {dayName:'Sunday',workoutName:'Rest',focus:'Recovery',duration:'',isRest:true,exercises:[]}
  ]};
}

// ── STRENGTH BASELINE SCREEN ──────────────────────────────────────────────
// Key lifts grouped by category. User picks which ones they know and enters their 1RM.
var BASELINE_LIFTS = [
  {cat:'Upper Push', lifts:['Bench Press','Overhead Press','Incline Bench Press','Dumbbell Shoulder Press']},
  {cat:'Upper Pull', lifts:['Barbell Row','Pull-Up / Lat Pulldown','Dumbbell Row','Cable Row']},
  {cat:'Lower', lifts:['Squat','Deadlift','Romanian Deadlift','Leg Press','Hip Thrust']},
  {cat:'Arms / Accessories', lifts:['Barbell Curl','Tricep Pushdown','Dips','Face Pull']}
];

function StrengthBaseline(props) {
  // oneRMs: { 'Bench Press': '225', 'Squat': '', ... }
  const [oneRMs, setOneRMs] = useState(props.existingRMs || {});
  const [unit, setUnit] = useState('lbs');

  const setRM = function(lift, val) {
    setOneRMs(function(p){ return Object.assign({}, p, {[lift]: val}); });
  };

  const filledCount = Object.values(oneRMs).filter(function(v){ return v && v.trim(); }).length;

  // Convert lbs<->kg display (stored always as lbs)
  const toDisplay = function(lbsVal) {
    if (!lbsVal) return '';
    if (unit === 'kg') return String(Math.round(parseFloat(lbsVal) / 2.205));
    return lbsVal;
  };
  const fromDisplay = function(dispVal) {
    if (!dispVal || !dispVal.trim()) return '';
    if (unit === 'kg') return String(Math.round(parseFloat(dispVal) * 2.205));
    return dispVal;
  };

  const handleSkip = function() { props.onComplete({}); };
  const handleContinue = function() {
    // Only pass lifts that have a value
    const filled = {};
    Object.keys(oneRMs).forEach(function(k){ if (oneRMs[k] && oneRMs[k].trim()) filled[k] = oneRMs[k]; });
    props.onComplete(filled);
  };

  return div({className:'screen'},
    div({style:{padding:'48px 20px 0',flexShrink:0}},
      div({className:'lbl', style:{marginBottom:'2px'}}, 'Optional'),
      div({className:'disp', style:{fontSize:'clamp(28px,8vw,40px)',marginBottom:'8px'}}, 'STRENGTH BASELINE'),
      div({style:{fontSize:'13px',color:'var(--muted2)',lineHeight:'1.65',marginBottom:'14px'}},
        'Enter your 1-rep maxes for any lifts you know. The AI uses these to calculate ',
        e('strong',{style:{color:'var(--acc)'}},'precise working weights'),
        ' for every exercise in your plan. Skip any you\'re unsure about.'
      ),
      div({style:{display:'flex',gap:'8px',marginBottom:'4px'}},
        div({style:{fontSize:'12px',color:'var(--muted2)',flex:1,alignSelf:'center'}}, filledCount > 0 ? filledCount + ' lift' + (filledCount!==1?'s':'')+' entered' : 'No lifts entered yet — all optional'),

  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});

    const sw = "const C='forge-r2';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.add(self.location.href)).then(()=>self.skipWaiting())));self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))).then(()=>self.clients.claim())));self.addEventListener('fetch',e=>{if(e.request.url.includes('anthropic.com')||e.request.url.includes('cdnjs')){e.respondWith(fetch(e.request).catch(()=>new Response('',{status:503})));return;}e.respondWith(caches.match(e.request).then(r=>{if(r)return r;return fetch(e.request).then(rs=>{if(rs&&rs.status===200){const cl=rs.clone();caches.open(C).then(ca=>ca.put(e.request,cl));}return rs;}).catch(()=>caches.match(e.request));}));});";

// ── VOICE HELPER ──────────────────────────────────────────────────────────
async function startVoice(onResult, onEnd, onError) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice not supported. Use Safari (iOS) or Chrome.'); return null; }
  try { await navigator.mediaDevices.getUserMedia({audio:true}); } catch(e) { alert('Mic permission denied.'); return null; }
  const sr = new SR(); sr.continuous = false; sr.interimResults = true; sr.lang = 'en-US';
  let final = '';
  sr.onresult = function(e2) {
    const t = Array.from(e2.results).map(function(r){return r[0].transcript;}).join('');
    onResult(t);
    if (e2.results[e2.results.length-1].isFinal) final = t;
  };
  sr.onerror = function(ev) { if (onError) onError(ev.error); };
  sr.onend = function() { if (onEnd) onEnd(final); };
  try { sr.start(); return sr; } catch(err) { alert('Voice error: ' + err.message); return null; }
}

    setWSets(function(p) {
      const newEi = dir === 'up' ? ei - 1 : ei + 1;

    ps.forEach(function(s, si) {

  const onFb = useCallback(function(ei, done, adj, msg) {
    setWSets(function(p) {

      const cur = (n[ei] || []).slice();
      adj.forEach(function(s, i) {
        const ti = done + i;
        if (ti < cur.length) cur[ti] = Object.assign({}, cur[ti], {weight:s.weight!=null?String(s.weight):cur[ti].weight, reps:s.reps!=null?String(s.reps):cur[ti].reps});
        else cur.push({weight:s.weight!=null?String(s.weight):'', reps:s.reps!=null?String(s.reps):'', done:false});
      });
      n[ei] = cur; return n;
    });
    if (msg) setTip(msg); toast$('Sets adjusted');
  }, []);
    setWSets(function(p){ const n=Object.assign({},p); const cur=(n[ei]||[]).slice(); adj.forEach(function(s,i){ const ti=done+i; if(ti<cur.length) cur[ti]=Object.assign({},cur[ti],{weight:s.weight!=null?String(s.weight):cur[ti].weight,reps:s.reps!=null?String(s.reps):cur[ti].reps}); else cur.push({weight:s.weight!=null?String(s.weight):'',reps:s.reps!=null?String(s.reps):'',done:false}); }); n[ei]=cur; return n; });
    if (msg) setTip(msg); toast$('Sets adjusted');
  }, []);

  const finish = async function() {
    const idx = wIdx, day = st.weekPlan.days[idx];
    const sum = day.exercises.map(function(ex,ei){ const done=(wSets[ei]||[]).filter(function(s){return s.done||s.reps;}); return ex.name+': '+done.length+'×'; }).join(', ');
    const entry = {date:new Date().toLocaleDateString(),dayIndex:idx,week:st.weekNum,workoutName:day.workoutName,focus:day.focus,summary:sum,isPrior:false,loggedSets:Object.assign({},wSets),exercises:day.exercises.map(function(ex){return {name:ex.name,sets:ex.sets,reps:ex.reps,target:ex.target||null};})};
    let nh = isRe ? st.history.map(function(h){return h.dayIndex===idx&&h.week===st.weekNum?entry:h;}) : st.history.concat([entry]);
    const wDays = st.weekPlan.days.filter(function(d){return !d.isRest;});
    const dtw = nh.filter(function(h){return h.week===st.weekNum&&!h.isPrior;}).length;
    setScreen('main'); setTab('dashboard'); setWIdx(null); setWSets({}); setIsRe(false);
    if (!isRe && dtw >= wDays.length) {
      upd({history:nh}); const nw = st.weekNum + 1; setGenMsg('Week complete! Building Week '+nw+'…'); setScreen('generating');
      const lastLog = buildLog(nh, st.weekNum, st.weekPlan);
      try { const plan = await genPlan(st.profile, nw, st.priorSummary, lastLog, st.oneRMs||{}); upd({weekPlan:plan,weekNum:nw,history:nh}); }
      catch(e2) { upd({weekPlan:fallback(st.profile),weekNum:nw,history:nh}); }
      setScreen('main');
    } else { upd({history:nh}); toast$(isRe?'Workout updated! 💪':'Workout logged! 💪'); }
  };

  const onSplash = function(reset) {
    if (reset) { upd({profile:null,weekPlan:null,weekNum:1,history:[],priorSummary:'',disliked:[]}); setScreen('onboard'); return; }
    if (!getKey()) { setShowSettings(true); return; }
    if (st.profile && st.weekPlan) { setScreen('main'); setTab('dashboard'); } else setScreen('onboard');
  };

  const curDay = wIdx !== null && st.weekPlan ? st.weekPlan.days[wIdx] : null;
  const hasData = !!(st.profile && st.weekPlan);

  return div({style:{position:'relative',width:'100%',height:'100%',overflow:'hidden'}},
    screen==='splash' && e(Splash, {hasData:hasData, onStart:onSplash, onSettings:function(){setShowSettings(true);}}),
    screen==='onboard' && e(Onboarding, {onComplete:onBoard}),
    screen==='baseline' && e(StrengthBaseline, {onComplete:onBaselineComplete, existingRMs:st.oneRMs||{}}),
    screen==='generating' && e(Loading, {msg:genMsg}),
    screen==='main' && !showChat && div({style:{position:'relative',width:'100%',height:'100%'}},
      tab==='dashboard' && e(Dashboard, {st:st, onW:startW, onChat:function(){setShowChat(true);}, onMissed:function(){setShowMissed(true);}, onSettings:function(){setShowSettings(true);}, onUpdateRMs:function(){pendingProfileRef.current=st.profile;setScreen('baseline');}}),
      tab==='history' && e(HistoryScreen, {history:st.history}),
      tab==='import' && e(ImportScreen, {profile:st.profile, onImported:function(ents, sum){ upd({history:st.history.concat(ents), priorSummary:(st.priorSummary?st.priorSummary+'\n':'')+sum}); setTab('dashboard'); toast$(ents.length+' sessions imported!'); }}),
      e('nav', {className:'nav'},
        [['🏠','Home','dashboard'],['📊','History','history'],['📥','Import','import']].map(function(x){
          return btn({key:x[2], className:'nb'+(tab===x[2]?' on':''), onClick:function(){setTab(x[2]);}},
            span({className:'ni'}, x[0]), span({className:'nl'}, x[1])
          );
        }),
        btn({className:'nb', onClick:function(){setShowChat(true);}}, span({className:'ni'},'🤖'), span({className:'nl'},'Coach'))
      )
    ),
    screen==='workout' && wIdx!==null && e(WorkoutScreen, {dayIdx:wIdx,plan:st.weekPlan,profile:st.profile,sets:wSets,isRe:isRe,onU:onU,onT:onT,onAS:onAS,onSwap:function(ei){setShowSwap(ei);},onRm:onRm,onAddEx:function(){setShowAddEx(true);},onFinish:finish,onBack:function(){setScreen('main');setTab('dashboard');},onVL:onVL,onFb:onFb,onReorder:onReorder,tip:tip,tipLoad:tipLoad}),
    showChat && e(ChatScreen, {profile:st.profile,plan:st.weekPlan,weekNum:st.weekNum,history:st.history,onClose:function(){setShowChat(false);}}),
    showSettings && e(Settings, {onClose:function(){setShowSettings(false);}, onSaved:function(){}}),
    showMissed && e(MissedModal, {profile:st.profile,plan:st.weekPlan,weekNum:st.weekNum,history:st.history,onAdapted:function(plan){upd({weekPlan:plan});setShowMissed(false);toast$('Plan adapted!');},onClose:function(){setShowMissed(false);}}),
    showSwap !== null && curDay && curDay.exercises[showSwap] && e(SwapModal, {ex:curDay.exercises[showSwap],ei:showSwap,profile:st.profile,disliked:st.disliked||[],curExs:curDay.exercises,oneRMs:st.oneRMs||{},onSwap:onSwapC,onClose:function(){setShowSwap(null);}}),
    showAddEx && curDay && e(AddExModal, {day:curDay,profile:st.profile,disliked:st.disliked||[],oneRMs:st.oneRMs||{},onAdd:onAddExC,onClose:function(){setShowAddEx(false);}}),
    inst && div({style:{position:'fixed',bottom:'calc(64px + var(--safe))',left:'9px',right:'9px',background:'var(--s2)',border:'1px solid var(--acc)',padding:'10px 12px',display:'flex',alignItems:'center',gap:'9px',zIndex:150}},
      span({style:{fontSize:'19px'}}, '📲'),
      div({style:{flex:1}},
        div({style:{fontSize:'13px',fontWeight:700,color:'var(--acc)',letterSpacing:'1px'}}, 'INSTALL FORGE'),
        div({style:{fontSize:'11px',color:'var(--muted2)',marginTop:'1px'}}, 'Add to home screen')
      ),
      btn({className:'btn ba', style:{padding:'6px 12px',fontSize:'12px'}, onClick:async function(){inst.prompt();await inst.userChoice;setInst(null);}}, 'INSTALL'),
      btn({onClick:function(){setInst(null);}, style:{background:'none',border:'none',color:'var(--muted2)',fontSize:'17px',cursor:'pointer',padding:'0 2px'}}, '×')
    ),
    toast && e(Toast, {msg:toast, onDone:function(){setToast('');} })
  );
}

// ── MOUNT ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(e(App));

})();
</script>
</body>
